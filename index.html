<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>赛博竞速</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#080c1a;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;font-family:'Microsoft YaHei','PingFang SC','Segoe UI',system-ui,sans-serif}
canvas{display:block}
#ctrl{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:space-between;align-items:center;padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 10px);z-index:10;pointer-events:none;background:rgba(10,14,30,0.7);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(0,255,255,0.18)}
#ctrl.show{display:flex}
.bg{display:flex;gap:8px;pointer-events:auto}
.bg.left{flex-direction:column;gap:6px}
.cb{width:54px;height:54px;border-radius:14px;border:1.5px solid rgba(0,255,255,0.25);background:rgba(0,255,255,0.05);color:rgba(0,255,255,0.8);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;cursor:pointer;transition:all .12s;box-shadow:0 0 10px rgba(0,255,255,0.06)}
.cb:active,.cb.pressed{background:rgba(0,255,255,0.18);border-color:rgba(0,255,255,0.5);box-shadow:0 0 18px rgba(0,255,255,0.2)}
.cb.jump{border-color:rgba(255,0,200,0.25);color:rgba(255,0,200,0.8);background:rgba(255,0,200,0.05);box-shadow:0 0 10px rgba(255,0,200,0.06)}
.cb.jump:active,.cb.jump.pressed{background:rgba(255,0,200,0.18);border-color:rgba(255,0,200,0.5)}
.cb.nos{border-color:rgba(255,100,0,0.25);color:rgba(255,100,0,0.8);background:rgba(255,100,0,0.05);font-size:12px;font-weight:800}
.cb.nos.ready{border-color:rgba(0,255,100,0.7);color:rgba(0,255,100,1);animation:np .7s infinite}
.cb.nos.active{border-color:rgba(255,140,0,0.8);color:#ff8800;background:rgba(255,100,0,0.18);animation:none}
@keyframes np{0%,100%{box-shadow:0 0 8px rgba(0,255,100,0.25)}50%{box-shadow:0 0 22px rgba(0,255,100,0.45)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ctrl">
<div class="bg left"><div class="cb" id="btn-up">▲</div><div class="cb" id="btn-down">▼</div></div>
<div class="bg right"><div class="cb jump" id="btn-jump">跳</div><div class="cb nos" id="btn-nos">氮气</div></div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,roadY,DPR=1;

const TRACKS=[
{name:'霓虹高速',sub:'初入赛博世界',target:2200,stars:[4000,8000,14000],diff:1,
ac:[0,255,255],ac2:[0,140,255],rain:false},
{name:'午夜狂飙',sub:'暗紫深渊',target:2800,stars:[5000,10000,18000],diff:1.15,
ac:[255,0,255],ac2:[200,0,170],rain:false},
{name:'暗影穿梭',sub:'绿光迷城',target:3400,stars:[6000,12000,22000],diff:1.3,
ac:[0,255,120],ac2:[0,200,80],rain:false},
{name:'电磁风暴',sub:'雷霆暴雨',target:3000,stars:[5500,11000,20000],diff:1.45,
ac:[255,80,30],ac2:[255,40,0],rain:true},
{name:'量子赛道',sub:'高速裂变',target:3600,stars:[7000,14000,25000],diff:1.6,
ac:[255,220,0],ac2:[255,180,0],rain:false},
{name:'虚空之路',sub:'终极试炼',target:4000,stars:[8000,16000,28000],diff:1.8,
ac:[255,50,100],ac2:[200,0,60],rain:false}
];

let state='menu',mode='freerun',curTrack=0;
let t=0,scroll=0,wheelAng=0;
let score=0,gameTime=0,speedMul=1,baseSpd=350;
let shakeAmt=0,flashA=0,flashC='255,50,30';
let pLane=0,pY=0,pTgtY=0,pJumping=false,pJumpVel=0,pJumpOff=0;
let nitro=0,nitroActive=false,nitroTimer=0;
let gear=1,displaySpd=0;
let distance=0,coinsCollected=0,overtakeCount=0,maxSpd=0,surviveTime=0;
let obstacles=[],obsTimer=0,coins=[],coinTimer=0,cFx=[];
let nitroPickups=[],nitroPickTimer=0;
let aiCars=[],aiTimer=0;
let overtakeFx=[];
let speedLines=[];
let fireTrail=[];
let rainDrops=[];
let ambientPs=[];
let menuSel=0;
let isTouchDevice=false;
let raceTotal=6,racePosition=6,prevPosition=6,posChangeFx=0,posChangeDir=0;

const OD={rock:{w:42,h:36},cone:{w:28,h:48},barrier:{w:85,h:40}};
const AI_COLORS=['#ff0066','#00ff88','#ffaa00','#00ccff','#cc44ff','#ff6600','#44ffcc','#ff4488'];

let saveData={bestFreeRun:0,tracks:TRACKS.map((_,i)=>({unlocked:i===0,best:0,stars:0})),showTouch:'auto'};

function loadSave(){try{const d=JSON.parse(localStorage.getItem('cbr_save'));if(d&&d.tracks){saveData=d;if(!saveData.showTouch)saveData.showTouch='auto';while(saveData.tracks.length<TRACKS.length)saveData.tracks.push({unlocked:false,best:0,stars:0})}}catch(e){}}
function writeSave(){try{localStorage.setItem('cbr_save',JSON.stringify(saveData))}catch(e){}}
loadSave();

function laneY(l){
const rH=(H-roadY)*0.75;
return l===0?roadY+rH*0.22:roadY+rH*0.62;
}

function resize(){
DPR=window.devicePixelRatio||1;
W=innerWidth;H=innerHeight;
cv.width=W*DPR;cv.height=H*DPR;
cv.style.width=W+'px';cv.style.height=H+'px';
cx.setTransform(DPR,0,0,DPR,0,0);
roadY=H*0.55;
pTgtY=laneY(pLane);pY=pTgtY;
for(const o of obstacles)o.y=laneY(o.lane);
for(const c of coins)c.y=laneY(c.lane);
for(const n of nitroPickups)n.y=laneY(n.lane);
for(const a of aiCars)a.tgtY=laneY(a.lane);
updateTouchVis();
}
addEventListener('resize',resize);

function updateTouchVis(){
const el=document.getElementById('ctrl');
const show=saveData.showTouch==='on'||(saveData.showTouch==='auto'&&isTouchDevice);
if(state==='play'&&show)el.classList.add('show');else el.classList.remove('show');
const nb=document.getElementById('btn-nos');
nb.classList.toggle('ready',nitro>=100&&!nitroActive);
nb.classList.toggle('active',nitroActive);
}
resize();

function fract(x){return x-Math.floor(x)}
function hash(n){return fract(Math.sin(n*127.1)*43758.5453)}
function noise(x){const i=Math.floor(x),f=x-i,u=f*f*(3-2*f);return hash(i)*(1-u)+hash(i+1)*u}
function fbm(x,oct,seed){let v=0,a=.5,f=1;for(let i=0;i<oct;i++){v+=noise(x*f+seed)*a;f*=2.03;a*=.5}return v}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return v<mn?mn:v>mx?mx:v}
function ac(){return TRACKS[curTrack].ac}
function acS(a){return`rgb(${a[0]},${a[1]},${a[2]})`}
function acA(a,al){return`rgba(${a[0]},${a[1]},${a[2]},${al})`}

const stars=Array.from({length:120},()=>({x:Math.random(),y:Math.random()*.5,r:Math.random()*1.2+.3,tw:Math.random()*6.28}));
const farBld=Array.from({length:35},(_,i)=>({pos:i*75+Math.random()*35,w:18+Math.random()*55,h:50+Math.random()*140,seed:Math.random()*999}));
const FAR_BLD_SPAN=35*75+50;
const nearBld=Array.from({length:25},(_,i)=>({pos:i*100+Math.random()*50,w:25+Math.random()*50,h:20+Math.random()*55,seed:Math.random()*999}));
const NEAR_BLD_SPAN=25*100+60;
const neonSigns=Array.from({length:18},(_,i)=>({pos:i*210+Math.random()*80,h:25+Math.random()*35,ci:Math.floor(Math.random()*5)}));
const NEON_SIGN_SPAN=18*210+100;
const LAMP_SPACING=300;
const dustPs=[];

let keys={};
addEventListener('keydown',e=>{
keys[e.code]=true;
if(state==='menu'){
if(e.code==='ArrowUp'||e.code==='KeyW'){menuSel=(menuSel+2)%3}
if(e.code==='ArrowDown'||e.code==='KeyS'){menuSel=(menuSel+1)%3}
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();menuAction(menuSel)}
return;
}
if(state==='select'){
if(e.code==='ArrowLeft'||e.code==='KeyA')curTrack=Math.max(0,curTrack-1);
if(e.code==='ArrowRight'||e.code==='KeyD')curTrack=Math.min(TRACKS.length-1,curTrack+1);
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(saveData.tracks[curTrack].unlocked)startTournament(curTrack)}
if(e.code==='Escape'||e.code==='Backspace')state='menu';
return;
}
if(state==='gameover'||state==='levelcomplete'){
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();afterEndAction()}
if(e.code==='Escape')state='menu';
return;
}
if(state==='settings'){
if(e.code==='Escape'||e.code==='Backspace')state='menu';
if(e.code==='ArrowUp'||e.code==='ArrowDown'){
const opts=['auto','on','off'];
saveData.showTouch=opts[(opts.indexOf(saveData.showTouch)+1)%3];
writeSave();updateTouchVis();
}
return;
}
if(state!=='play')return;
switch(e.code){
case'ArrowUp':case'KeyW':e.preventDefault();setLane(0);break;
case'ArrowDown':case'KeyS':e.preventDefault();setLane(1);break;
case'Space':e.preventDefault();doJump();break;
case'KeyN':case'KeyF':case'ShiftLeft':case'ShiftRight':e.preventDefault();activateNitro();break;
case'Escape':state='menu';break;
}
});
addEventListener('keyup',e=>{keys[e.code]=false});

let touchBtns={up:false,down:false,jump:false,nos:false};
function setupTouchBtn(id,key){
const el=document.getElementById(id);
const onD=e=>{e.preventDefault();e.stopPropagation();touchBtns[key]=true;el.classList.add('pressed');
if(state==='play'){if(key==='up')setLane(0);if(key==='down')setLane(1);if(key==='jump')doJump();if(key==='nos')activateNitro()}};
const onU=e=>{e.preventDefault();e.stopPropagation();touchBtns[key]=false;el.classList.remove('pressed')};
el.addEventListener('touchstart',onD,{passive:false});
el.addEventListener('touchend',onU,{passive:false});
el.addEventListener('touchcancel',onU,{passive:false});
el.addEventListener('mousedown',onD);el.addEventListener('mouseup',onU);el.addEventListener('mouseleave',onU);
}
setupTouchBtn('btn-up','up');setupTouchBtn('btn-down','down');
setupTouchBtn('btn-jump','jump');setupTouchBtn('btn-nos','nos');

let touchY0=0,touchT0=0,touchHandled=false;
cv.addEventListener('touchstart',e=>{
e.preventDefault();isTouchDevice=true;updateTouchVis();
touchY0=e.touches[0].clientY;touchT0=performance.now();touchHandled=false;
},{passive:false});
cv.addEventListener('touchend',e=>{
e.preventDefault();
if(touchHandled)return;
if(state==='menu'){menuAction(menuSel);return}
if(state==='select'){
const tx=e.changedTouches[0].clientX;
if(tx<W*.3)curTrack=Math.max(0,curTrack-1);
else if(tx>W*.7)curTrack=Math.min(TRACKS.length-1,curTrack+1);
else if(saveData.tracks[curTrack].unlocked)startTournament(curTrack);
return;
}
if(state==='gameover'||state==='levelcomplete'){afterEndAction();return}
if(state==='settings'){
const opts=['auto','on','off'];
saveData.showTouch=opts[(opts.indexOf(saveData.showTouch)+1)%3];
writeSave();updateTouchVis();return;
}
},{passive:false});
cv.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

cv.addEventListener('click',e=>{
if(state==='menu'){
const my=e.clientY/H;
if(my>.36&&my<.52)menuAction(0);
else if(my>.52&&my<.66)menuAction(1);
else if(my>.66&&my<.80)menuAction(2);
}
else if(state==='select'){
const mx=e.clientX;
if(mx<W*.3)curTrack=Math.max(0,curTrack-1);
else if(mx>W*.7)curTrack=Math.min(TRACKS.length-1,curTrack+1);
else if(saveData.tracks[curTrack].unlocked)startTournament(curTrack);
}
else if(state==='gameover'||state==='levelcomplete')afterEndAction();
else if(state==='settings'){
const opts=['auto','on','off'];
saveData.showTouch=opts[(opts.indexOf(saveData.showTouch)+1)%3];
writeSave();updateTouchVis();
}
});

function menuAction(idx){
if(idx===0){mode='freerun';curTrack=0;startGame()}
else if(idx===1)state='select';
else if(idx===2)state='settings';
}

function afterEndAction(){
if(mode==='tournament'&&state==='levelcomplete'){
const next=curTrack+1;
if(next<TRACKS.length&&saveData.tracks[next].unlocked){curTrack=next;startTournament(curTrack)}
else state='select';
}else if(mode==='tournament')state='select';
else state='menu';
}

function startGame(){
state='play';score=0;gameTime=0;speedMul=1;distance=0;
coinsCollected=0;overtakeCount=0;maxSpd=0;surviveTime=0;
pLane=0;pY=pTgtY=laneY(0);pJumping=false;pJumpOff=0;pJumpVel=0;
obstacles=[];coins=[];cFx=[];nitroPickups=[];
nitro=30;nitroActive=false;nitroTimer=0;
gear=1;displaySpd=0;
aiCars=[];aiTimer=0;obsTimer=0;coinTimer=0;nitroPickTimer=0;
overtakeFx=[];speedLines=[];fireTrail=[];ambientPs=[];
shakeAmt=0;flashA=0;
racePosition=raceTotal;prevPosition=raceTotal;posChangeFx=0;
if(TRACKS[curTrack].rain)initRain();else rainDrops=[];
updateTouchVis();
}

function startTournament(idx){curTrack=idx;mode='tournament';startGame()}
function setLane(l){if(pLane!==l){pLane=l;pTgtY=laneY(l)}}
function doJump(){if(!pJumping){pJumping=true;pJumpVel=-420}}

function activateNitro(){
if(nitro>=100&&!nitroActive){
nitroActive=true;nitroTimer=3.5;
shakeAmt=Math.max(shakeAmt,.3);flashA=.15;flashC='0,180,255';
}
}

function endGame(){
state='gameover';
if(mode==='freerun'&&score>saveData.bestFreeRun){saveData.bestFreeRun=Math.floor(score);writeSave()}
shakeAmt=.6;flashA=.5;flashC='255,50,30';
}

function completeLevel(){
state='levelcomplete';
const td=saveData.tracks[curTrack],sc=Math.floor(score);
let earned=0;const th=TRACKS[curTrack].stars;
if(sc>=th[0])earned=1;if(sc>=th[1])earned=2;if(sc>=th[2])earned=3;
if(earned>td.stars)td.stars=earned;
if(sc>td.best)td.best=sc;
td.unlocked=true;
if(curTrack+1<TRACKS.length)saveData.tracks[curTrack+1].unlocked=true;
writeSave();shakeAmt=0;flashA=.3;flashC='255,220,100';
}

function initRain(){
rainDrops=[];
for(let i=0;i<120;i++)rainDrops.push({x:Math.random()*1.2-.1,y:Math.random(),sp:.012+Math.random()*.008,len:8+Math.random()*12});
}

function spawnObs(){
const sc=Math.min(W,H)/850;
const diff=TRACKS[curTrack].diff||1;
if(gameTime>20&&Math.random()<Math.min(.22,(gameTime-20)*.003*diff)){
const ts=['rock','cone','barrier'];
const tp=ts[Math.floor(Math.random()*ts.length)],d=OD[tp];
obstacles.push({x:W+80,lane:0,y:laneY(0),type:tp,w:d.w*sc,h:d.h*sc,warned:false,nearMissed:false});
obstacles.push({x:W+80,lane:1,y:laneY(1),type:tp,w:d.w*sc,h:d.h*sc,warned:false,nearMissed:false});
return;
}
const types=['rock','cone','barrier'];
const tp=types[Math.floor(Math.random()*types.length)],d=OD[tp];
const lane=Math.random()<.5?0:1;
obstacles.push({x:W+80,lane,y:laneY(lane),type:tp,w:d.w*sc,h:d.h*sc,warned:false,nearMissed:false});
}

function spawnCoin(){
const sc=Math.min(W,H)/850;
const lane=Math.random()<.5?0:1;
coins.push({x:W+60,lane,y:laneY(lane),r:11*sc});
if(Math.random()<.35){for(let i=1;i<4;i++)coins.push({x:W+60+i*38*sc,lane,y:laneY(lane),r:11*sc})}
}

function spawnNitroPickup(){
const sc=Math.min(W,H)/850;
const lane=Math.random()<.5?0:1;
nitroPickups.push({x:W+60,lane,y:laneY(lane),r:14*sc,pulse:Math.random()*6.28});
}

function spawnAiCar(){
const sc=Math.min(W,H)/850;
const lane=Math.random()<.5?0:1;
const col=AI_COLORS[Math.floor(Math.random()*AI_COLORS.length)];
const fromBehind=Math.random()<0.12;
if(fromBehind){
aiCars.push({x:-250,lane,y:laneY(lane),tgtY:laneY(lane),
color:col,spdRatio:1.15+Math.random()*.25,overtaken:false,fromBehind:true,passed:false,
laneTimer:2+Math.random()*3,w:110*sc,h:44*sc});
}else{
aiCars.push({x:W+200+Math.random()*200,lane,y:laneY(lane),tgtY:laneY(lane),
color:col,spdRatio:.45+Math.random()*.35,overtaken:false,fromBehind:false,passed:false,
laneTimer:3+Math.random()*5,w:110*sc,h:44*sc});
}
}

function spawnCFx(x,y){
for(let i=0;i<12;i++){
const a=(i/12)*6.2832;
cFx.push({x,y,vx:Math.cos(a)*140+(Math.random()-.5)*70,vy:Math.sin(a)*140+(Math.random()-.5)*70,life:1,sz:2+Math.random()*3.5});
}
}

function spawnOvertakeFx(x,y,text,pts){
overtakeFx.push({x:W*.5,y:H*.35,life:1.2,text:text||'超车！',score:pts||200,big:true});
overtakeFx.push({x:x+20,y:y-25,life:1,text:`+${pts||200}`,score:0,big:false});
}

function updateGame(dt,spd){
const diff=TRACKS[curTrack].diff||1;
gameTime+=dt;surviveTime+=dt;
speedMul=1+gameTime*.006*diff;
if(speedMul>2.8)speedMul=2.8;

let effSpd=spd;
if(nitroActive){
nitroTimer-=dt;effSpd*=1.6;nitro-=dt*30;
if(nitroTimer<=0||nitro<=0){nitroActive=false;nitroTimer=0;nitro=Math.max(0,nitro)}
for(let i=0;i<3;i++){
fireTrail.push({x:W*.3-120*(Math.min(W,H)/850),y:pY+pJumpOff+(Math.random()-.5)*15,
vx:-200-Math.random()*150,vy:(Math.random()-.5)*60,life:1,sz:3+Math.random()*5,
hue:Math.random()<.3?200:Math.random()<.5?30:50});
}
if(Math.random()<.4)speedLines.push({x:W+10,y:Math.random()*H,len:60+Math.random()*120,life:1,sp:800+Math.random()*400});
}

const curSpd=effSpd*.3;
if(curSpd>displaySpd)displaySpd+=(curSpd-displaySpd)*Math.min(1,4*dt);
else displaySpd+=(curSpd-displaySpd)*Math.min(1,8*dt);
if(displaySpd>maxSpd)maxSpd=displaySpd;
gear=displaySpd<80?1:displaySpd<130?2:displaySpd<190?3:displaySpd<260?4:displaySpd<340?5:6;

score+=dt*100*speedMul*(nitroActive?1.5:1);
distance+=effSpd*dt*.1;
if(mode==='tournament'&&distance>=TRACKS[curTrack].target){completeLevel();return}

pY+=(pTgtY-pY)*Math.min(1,12*dt);
if(pJumping){pJumpOff+=pJumpVel*dt;pJumpVel+=1050*dt;if(pJumpOff>=0){pJumpOff=0;pJumping=false;pJumpVel=0}}

obsTimer+=dt;
const oi=Math.max(.45,1.6-gameTime*.01*diff);
if(obsTimer>=oi){obsTimer=0;spawnObs()}

coinTimer+=dt;
if(coinTimer>=.9+Math.random()*.6){coinTimer=0;spawnCoin()}

nitroPickTimer+=dt;
if(nitroPickTimer>=4+Math.random()*3){nitroPickTimer=0;spawnNitroPickup()}

aiTimer+=dt;
const aiInterval=Math.max(1.8,4-gameTime*.02);
if(aiTimer>=aiInterval&&aiCars.length<6){aiTimer=0;spawnAiCar()}

for(let i=obstacles.length-1;i>=0;i--){obstacles[i].x-=effSpd*dt;if(obstacles[i].x<-200)obstacles.splice(i,1)}
for(let i=coins.length-1;i>=0;i--){coins[i].x-=effSpd*dt;if(coins[i].x<-60)coins.splice(i,1)}
for(let i=nitroPickups.length-1;i>=0;i--){nitroPickups[i].x-=effSpd*dt;if(nitroPickups[i].x<-60)nitroPickups.splice(i,1)}

const carX=W*.3;
for(let i=aiCars.length-1;i>=0;i--){
const a=aiCars[i];
if(a.fromBehind){
a.x+=(effSpd*a.spdRatio-effSpd)*dt+effSpd*dt*0.3;
}else{
a.x-=(effSpd-effSpd*a.spdRatio)*dt;
}
a.y+=(a.tgtY-a.y)*Math.min(1,6*dt);
a.laneTimer-=dt;
if(a.laneTimer<=0){a.laneTimer=2+Math.random()*4;a.lane=a.lane===0?1:0;a.tgtY=laneY(a.lane)}
if(a.x<-250||a.x>W+500){aiCars.splice(i,1);continue}
if(!a.fromBehind&&!a.overtaken&&a.x<carX+30){
a.overtaken=true;overtakeCount++;score+=200;
racePosition=Math.max(1,racePosition-1);
if(racePosition<prevPosition){posChangeFx=1.5;posChangeDir=-1}
prevPosition=racePosition;
spawnOvertakeFx(a.x,a.y,'超车！',200);
shakeAmt=Math.max(shakeAmt,.15);
}
if(a.fromBehind&&!a.passed&&a.x>carX+80){
a.passed=true;
racePosition=Math.min(raceTotal,racePosition+1);
if(racePosition>prevPosition){posChangeFx=1.5;posChangeDir=1}
prevPosition=racePosition;
spawnOvertakeFx(a.x,a.y,'被超越',0);
}
}

if(posChangeFx>0)posChangeFx-=dt;

const sc=Math.min(W,H)/850;
const carCY=pY+pJumpOff-30*sc;
const chw=72*sc,chh=22*sc;

for(const o of obstacles){
const oCY=o.y-o.h*.5;
if(Math.abs(carX-o.x)<chw+o.w*.38&&Math.abs(carCY-oCY)<chh+o.h*.38){endGame();return}
if(!o.nearMissed){
const dist=Math.sqrt((carX-o.x)**2+(carCY-oCY)**2);
const hitDist=chw+o.w*.38;
if(dist<hitDist*1.6&&dist>=hitDist&&Math.abs(carCY-oCY)<chh+o.h*.6){
o.nearMissed=true;score+=50;
overtakeFx.push({x:o.x,y:o.y-40*sc,life:1,text:'惊险！+50',score:0,big:false});
}
}
}

for(let i=coins.length-1;i>=0;i--){
const c=coins[i],ccY=c.y-15*sc;
if(Math.abs(carX-c.x)<chw+c.r*1.5&&Math.abs(carCY-ccY)<chh+c.r*1.5){
score+=100;coinsCollected++;nitro=Math.min(100,nitro+5);
spawnCFx(c.x,ccY);coins.splice(i,1);
}
}

for(let i=nitroPickups.length-1;i>=0;i--){
const n=nitroPickups[i],ny=n.y-15*sc;
if(Math.abs(carX-n.x)<chw+n.r*1.8&&Math.abs(carCY-ny)<chh+n.r*1.8){
nitro=Math.min(100,nitro+30);flashA=.1;flashC='0,200,255';shakeAmt=Math.max(shakeAmt,.1);
for(let j=0;j<15;j++){const a2=(j/15)*6.2832;cFx.push({x:n.x,y:ny,vx:Math.cos(a2)*160,vy:Math.sin(a2)*160,life:1,sz:3+Math.random()*4})}
nitroPickups.splice(i,1);
}
}

for(const a of aiCars){
if(Math.abs(carX-a.x)<chw+a.w*.35&&Math.abs(carCY-(a.y-a.h*.3))<chh+a.h*.35){endGame();return}
}

if(ambientPs.length<25&&Math.random()<.3){
const c=ac();
ambientPs.push({x:W+5,y:Math.random()*roadY,vx:-25-Math.random()*40,vy:(Math.random()-.5)*15,life:1,sz:1+Math.random()*2,
r:c[0],g:c[1],b:c[2]});
}

updateTouchVis();
}

function roundRect(x,y,w,h,r){
cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);
cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);
cx.closePath();
}

const starFs=Math.max(24,Math.min(W,H)*.04);
cx.font=`${starFs}px sans-serif`;
for(let s=0;s<3;s++){
cx.fillStyle=s<td.stars?'#ffd060':'rgba(255,255,255,0.12)';
cx.fillText('★',W/2+(s-1)*starFs*1.3,H*.24);
}

const scf=Math.max(18,W*.03);
cx.font=`bold ${scf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle=acS(c);cx.shadowColor=acA(c,0.4);cx.shadowBlur=10;
cx.fillText(`${Math.floor(score)}`,W/2,H*.33);cx.shadowBlur=0;

cx.font=`bold ${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
const posColor=racePosition<=1?'#ffd060':racePosition<=3?'#00ff88':'#ffaa00';
cx.fillStyle=posColor;
cx.fillText(`最终排名: 第${racePosition}名`,W/2,H*.39);

const lh=sf*1.7;
let y0=H*.46;
const stats=[
['距离',`${Math.floor(distance)}m`],
['金币',`${coinsCollected}`],
['超车',`${overtakeCount}`],
['最高时速',`${Math.floor(maxSpd)} km/h`],
['时间',`${Math.floor(surviveTime)}s`]
];
cx.font=`${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
for(const[label,val]of stats){
cx.fillStyle='rgba(255,255,255,0.4)';cx.textAlign='right';cx.fillText(label,W/2-12,y0);
cx.fillStyle=acA(c,0.8);cx.textAlign='left';cx.fillText(val,W/2+12,y0);
y0+=lh;
}

cx.textAlign='center';
const hasNext=curTrack+1<TRACKS.length&&saveData.tracks[curTrack+1].unlocked;
const pulse=.3+.65*Math.sin(t*2.5);
cx.fillStyle=`rgba(255,255,255,${pulse*.4})`;
cx.font=`${Math.max(11,W*.013)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillText(hasNext?'点击或回车进入下一赛道':'点击或回车返回',W/2,H*.92);
cx.restore();
}

function drawLaneHint(){
if(state!=='play')return;
const sc=Math.min(W,H)/850,c=ac();
const carX=W*.3;
const ind=pLane===0?laneY(0)-40*sc:laneY(1)-40*sc;
cx.save();cx.globalAlpha=.08+.03*Math.sin(t*4);
cx.strokeStyle=acS(c);cx.lineWidth=1.5;cx.setLineDash([4,4]);
cx.beginPath();cx.moveTo(carX-90*sc,ind+55*sc);cx.lineTo(carX+100*sc,ind+55*sc);cx.stroke();
cx.setLineDash([]);cx.restore();
}

let last=0;

function frame(ts){
const dt=Math.min((ts-last)/1000,.04);
last=ts;t+=dt;

let spd;
if(state==='play')spd=baseSpd*speedMul;
else if(state==='gameover'||state==='levelcomplete'){speedMul*=Math.pow(.08,dt);if(speedMul<.015)speedMul=.015;spd=baseSpd*speedMul}
else spd=120*(1+Math.sin(t*.25)*.04);

let effSpd=spd;
if(state==='play'&&nitroActive)effSpd*=1.6;

scroll+=effSpd*dt;
wheelAng-=effSpd*dt*.065;

if(state==='play')updateGame(dt,spd);

for(let i=cFx.length-1;i>=0;i--){cFx[i].x+=cFx[i].vx*dt;cFx[i].y+=cFx[i].vy*dt;cFx[i].life-=dt*2.5;if(cFx[i].life<=0)cFx.splice(i,1)}
if(shakeAmt>0){shakeAmt-=dt*1.8;if(shakeAmt<0)shakeAmt=0}
if(flashA>0){flashA-=dt*1.5;if(flashA<0)flashA=0}

cx.save();
if(shakeAmt>0||(state==='play'&&nitroActive)){
const shake=shakeAmt+(nitroActive?.02:0);
cx.translate((Math.random()-.5)*shake*22,(Math.random()-.5)*shake*16);
}
cx.clearRect(-30,-30,W+60,H+60);
cx.imageSmoothingEnabled=false;

drawSky();drawStars();drawNeonOrb();
drawCityLayer(scroll*.05,farBld,FAR_BLD_SPAN,roadY-H*.02,1,.7);
drawCityLayer(scroll*.12,nearBld,NEAR_BLD_SPAN,roadY+2,.8,.5);
drawRoad();drawRoadMarkings(scroll*1.0);drawNeonLamps(scroll*.7);
drawLaneHint();
drawObstacles();drawCoins();drawNitroPickups();
drawAiCars();

const carPx=W*.3;
const carPy=state==='menu'||state==='select'||state==='settings'?laneY(0):pY+pJumpOff;
const carSc=Math.min(W,H)/850;
updateDust(dt,carPx,carPy,carSc);
drawDust();drawFireTrail(dt);
drawCar(carPx,carPy);
drawCFx();drawSpeedLines(dt);drawOvertakeFx(dt);
drawAmbientParticles(dt);drawRain(dt);
drawVignette();drawNitroScreenFx();

if(flashA>0){cx.fillStyle=`rgba(${flashC},${flashA})`;cx.fillRect(-30,-30,W+60,H+60)}
cx.restore();

drawObstacleWarnings();
drawHUD();
if(state==='menu')drawMenu();
else if(state==='select')drawTrackSelect();
else if(state==='settings')drawSettings();
else if(state==='gameover')drawGameOver();
else if(state==='levelcomplete')drawLevelComplete();

requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
