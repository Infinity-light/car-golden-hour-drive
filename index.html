<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Golden Hour Racing</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;font-family:'Segoe UI',Arial,sans-serif}
canvas{display:block}
#touch-ui{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:space-between;align-items:flex-end;padding:10px 14px 14px;z-index:10;pointer-events:none}
#touch-ui.show{display:flex}
.tp{display:flex;flex-direction:column;gap:8px;pointer-events:auto}
.tp.right{flex-direction:row;gap:10px;align-items:flex-end}
.cb{width:62px;height:62px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.35);color:rgba(255,255,255,0.75);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;cursor:pointer;transition:background 0.1s}
.cb:active,.cb.pressed{background:rgba(255,255,255,0.22)}
.cb.nos{border-color:rgba(0,180,255,0.4);color:rgba(0,200,255,0.8);font-size:13px;font-weight:800}
.cb.nos.ready{border-color:rgba(0,255,180,0.8);color:rgba(0,255,200,1);animation:nosPulse 0.7s infinite}
.cb.nos.active{border-color:rgba(255,140,0,0.9);color:#ff8800;background:rgba(255,100,0,0.25);animation:none}
@keyframes nosPulse{0%,100%{box-shadow:0 0 8px rgba(0,255,180,0.3)}50%{box-shadow:0 0 20px rgba(0,255,180,0.6)}}
#landscape-hint{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.92);color:#ddd;flex-direction:column;align-items:center;justify-content:center;gap:18px;font-size:16px;text-align:center;padding:30px}
#landscape-hint .icon{font-size:48px}
@media(orientation:portrait)and (max-width:900px)and (pointer:coarse){#landscape-hint{display:flex}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="touch-ui">
<div class="tp left">
<div class="cb" id="btn-up">&#9650;</div>
<div class="cb" id="btn-down">&#9660;</div>
</div>
<div class="tp right">
<div class="cb" id="btn-jump">JUMP</div>
<div class="cb nos" id="btn-nos">NOS</div>
</div>
</div>
<div id="landscape-hint">
<div class="icon">&#128241;&#8596;&#65039;</div>
<div>Rotate your device to landscape<br>for the best racing experience</div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,roadY;

const TRACKS=[
{name:'Sunset Boulevard',sub:'Golden hour warmth',target:2200,stars:[4000,8000,14000],diff:1,
sky:[[0,'#080c28'],[.12,'#0f0e35'],[.3,'#311845'],[.5,'#7a2840'],[.65,'#c4502a'],[.78,'#e08830'],[.9,'#f0c248'],[1,'#ffe890']],
starsA:.25,sunPos:[.72,1],sunC:['#fffbe8','#ffd050','#ff8828'],sunGlow:'rgba(255,210,90,0.35)',
cloudC:'rgba(160,85,50,0.12)',mtC:['#18102e','#221540'],hillC:['#1a2615','#121e0d'],treeC:'#0a0f08',
roadC:['#3a3632','#2c2a28','#222020','#181615'],roadE:'#4a4030',markC:'rgba(220,210,170,0.7)',
grassC:'#1a2510',hazeC:'rgba(200,145,90,0.03)',ambC:'rgba(255,180,80,0.08)',rain:false,neon:false},

{name:'Midnight Express',sub:'Darkness and speed',target:2800,stars:[5000,10000,18000],diff:1.15,
sky:[[0,'#010215'],[.3,'#040620'],[.6,'#080a2a'],[.85,'#0c0e32'],[1,'#101438']],
starsA:.5,sunPos:[.25,.85],sunC:['#e8eeff','#aac4ff','#6688cc'],sunGlow:'rgba(150,180,255,0.12)',
cloudC:'rgba(40,50,90,0.1)',mtC:['#080515','#060410'],hillC:['#060d18','#040a12'],treeC:'#030608',
roadC:['#20202a','#181822','#12121c','#0c0c16'],roadE:'#2a2a38',markC:'rgba(180,190,220,0.5)',
grassC:'#0a1208',hazeC:'rgba(30,40,80,0.03)',ambC:'rgba(80,100,200,0.04)',rain:false,neon:false},

{name:'Dawn Patrol',sub:'First light breaking',target:3400,stars:[6000,12000,22000],diff:1.3,
sky:[[0,'#0a1528'],[.2,'#1a2545'],[.4,'#3a3560'],[.55,'#8a4565'],[.7,'#d07858'],[.85,'#e8a860'],[1,'#f0d890']],
starsA:.08,sunPos:[.8,.98],sunC:['#fff5e0','#f0c060','#e09038'],sunGlow:'rgba(240,180,80,0.25)',
cloudC:'rgba(180,120,80,0.1)',mtC:['#121028','#1a1530'],hillC:['#152018','#101a10'],treeC:'#080c06',
roadC:['#353230','#282625','#201e1c','#181614'],roadE:'#454035',markC:'rgba(210,200,170,0.6)',
grassC:'#141e0e',hazeC:'rgba(180,130,80,0.03)',ambC:'rgba(240,160,60,0.06)',rain:false,neon:false},

{name:'Storm Chaser',sub:'Thunder and lightning',target:3000,stars:[5500,11000,20000],diff:1.45,
sky:[[0,'#0a0c15'],[.2,'#151820'],[.5,'#252830'],[.75,'#353838'],[1,'#454848']],
starsA:0,sunPos:[.5,.7],sunC:['#888','#777','#666'],sunGlow:'rgba(100,100,100,0.05)',
cloudC:'rgba(60,65,70,0.2)',mtC:['#0c0e12','#101215'],hillC:['#0e1210','#0a0e0c'],treeC:'#060808',
roadC:['#2a2a2e','#222225','#1c1c20','#161618'],roadE:'#3a3a40',markC:'rgba(180,180,190,0.5)',
grassC:'#0e140c',hazeC:'rgba(80,85,90,0.05)',ambC:'rgba(100,110,130,0.03)',rain:true,neon:false},

{name:'Desert Blaze',sub:'Heat and mirage',target:3600,stars:[7000,14000,25000],diff:1.6,
sky:[[0,'#1a2040'],[.15,'#2a2848'],[.3,'#604838'],[.5,'#a87028'],[.7,'#d09828'],[.85,'#e0b838'],[1,'#f0d860']],
starsA:.03,sunPos:[.6,.92],sunC:['#fffff0','#ffe840','#ffc020'],sunGlow:'rgba(255,220,60,0.3)',
cloudC:'rgba(180,150,100,0.06)',mtC:['#2a1810','#382018'],hillC:['#2a2010','#221a0c'],treeC:'#1a1408',
roadC:['#484038','#3a3430','#2e2a25','#22201c'],roadE:'#585040',markC:'rgba(230,220,180,0.6)',
grassC:'#28200e',hazeC:'rgba(200,170,100,0.05)',ambC:'rgba(255,200,80,0.08)',rain:false,neon:false},

{name:'Neon Highway',sub:'Cyberpunk nightlife',target:4000,stars:[8000,16000,28000],diff:1.8,
sky:[[0,'#020008'],[.2,'#080018'],[.5,'#100028'],[.75,'#180038'],[1,'#200845']],
starsA:.15,sunPos:[.5,.6],sunC:['#ff40ff','#cc20cc','#8800aa'],sunGlow:'rgba(200,0,255,0.12)',
cloudC:'rgba(80,20,120,0.1)',mtC:['#0a0018','#0c0020'],hillC:['#060012','#08001a'],treeC:'#040008',
roadC:['#1a1828','#141220','#10101c','#0c0c18'],roadE:'#2a2040',markC:'rgba(0,255,200,0.7)',
grassC:'#08100a',hazeC:'rgba(80,0,120,0.03)',ambC:'rgba(150,0,255,0.04)',rain:false,neon:true}
];

let state='menu',mode='freerun',curTrack=0;
let t=0,scroll=0,wheelAng=0;
let score=0,gameTime=0,speedMul=1,baseSpd=350;
let shakeAmt=0,flashA=0,flashC='255,50,30';
let pLane=0,pY=0,pTgtY=0,pJumping=false,pJumpVel=0,pJumpOff=0;
let nitro=0,nitroActive=false,nitroTimer=0;
let gear=1,displaySpd=0;
let distance=0,coinsCollected=0,overtakeCount=0,maxSpd=0,surviveTime=0;
let obstacles=[],obsTimer=0,coins=[],coinTimer=0,cFx=[];
let nitroPickups=[],nitroPickTimer=0;
let aiCars=[],aiTimer=0;
let overtakeFx=[];
let speedLines=[];
let fireTrail=[];
let rainDrops=[];
let menuSel=0;
let isTouchDevice=false;

const OD={rock:{w:32,h:28},cone:{w:22,h:38},barrier:{w:68,h:32},car:{w:120,h:48}};
const AI_COLORS=['#c03030','#30a030','#d0a020','#e0e0e0','#6030b0','#e06030','#30a0c0','#a0a0a0'];

let saveData={bestFreeRun:0,tracks:TRACKS.map((_,i)=>({unlocked:i===0,best:0,stars:0})),showTouch:'auto'};

function loadSave(){try{const d=JSON.parse(localStorage.getItem('ghr_save'));if(d&&d.tracks){saveData=d;if(!saveData.showTouch)saveData.showTouch='auto';while(saveData.tracks.length<TRACKS.length)saveData.tracks.push({unlocked:false,best:0,stars:0})}}catch(e){}}
function writeSave(){try{localStorage.setItem('ghr_save',JSON.stringify(saveData))}catch(e){}}
loadSave();

function laneY(l){return l===0?roadY+H*0.035:roadY+(H-roadY)*0.5}

function resize(){
W=cv.width=innerWidth;H=cv.height=innerHeight;
roadY=H*0.66;
pTgtY=laneY(pLane);pY=pTgtY;
for(const o of obstacles)o.y=laneY(o.lane);
for(const c of coins)c.y=laneY(c.lane);
for(const n of nitroPickups)n.y=laneY(n.lane);
for(const a of aiCars)a.tgtY=laneY(a.lane);
updateTouchVis();
}
addEventListener('resize',resize);

function updateTouchVis(){
const el=document.getElementById('touch-ui');
const show=saveData.showTouch==='on'||(saveData.showTouch==='auto'&&isTouchDevice);
if(state==='play'&&show)el.classList.add('show');else el.classList.remove('show');
const nb=document.getElementById('btn-nos');
nb.classList.toggle('ready',nitro>=100&&!nitroActive);
nb.classList.toggle('active',nitroActive);
}

resize();

function fract(x){return x-Math.floor(x)}
function hash(n){return fract(Math.sin(n*127.1)*43758.5453)}
function noise(x){const i=Math.floor(x),f=x-i,u=f*f*(3-2*f);return hash(i)*(1-u)+hash(i+1)*u}
function fbm(x,oct,seed){let v=0,a=.5,f=1;for(let i=0;i<oct;i++){v+=noise(x*f+seed)*a;f*=2.03;a*=.5}return v}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return v<mn?mn:v>mx?mx:v}

const stars=Array.from({length:150},()=>({x:Math.random(),y:Math.random()*.28,r:Math.random()*1.2+.4,tw:Math.random()*6.28}));
const clouds=Array.from({length:7},()=>({x:Math.random()*1.4-.2,y:.08+Math.random()*.22,w:.06+Math.random()*.12,h:.008+Math.random()*.015,sp:.001+Math.random()*.002}));
const farTrees=Array.from({length:50},(_,i)=>({pos:i*70+Math.random()*30,h:18+Math.random()*22,w:10+Math.random()*12,type:Math.random()>.45?'pine':'round'}));
const FARTREE_SPAN=50*70+60;
const bushes=Array.from({length:40},(_,i)=>({pos:i*100+Math.random()*50,h:5+Math.random()*8,w:8+Math.random()*14}));
const BUSH_SPAN=40*100+60;
const POLE_SPACING=380;
const dustPs=[];
const birds=Array.from({length:5},()=>({x:Math.random(),y:.08+Math.random()*.15,sp:.003+Math.random()*.004,flap:Math.random()*6.28}));

let keys={};
addEventListener('keydown',e=>{
keys[e.code]=true;
if(state==='menu'){
if(e.code==='ArrowUp'||e.code==='KeyW'){menuSel=(menuSel+2)%3}
if(e.code==='ArrowDown'||e.code==='KeyS'){menuSel=(menuSel+1)%3}
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();menuAction(menuSel)}
return;
}
if(state==='select'){
if(e.code==='ArrowLeft'||e.code==='KeyA'){curTrack=Math.max(0,curTrack-1)}
if(e.code==='ArrowRight'||e.code==='KeyD'){curTrack=Math.min(TRACKS.length-1,curTrack+1)}
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(saveData.tracks[curTrack].unlocked)startTournament(curTrack)}
if(e.code==='Escape'||e.code==='Backspace'){state='menu'}
return;
}
if(state==='gameover'||state==='levelcomplete'){
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();afterEndAction()}
if(e.code==='Escape'){state='menu'}
return;
}
if(state==='settings'){
if(e.code==='Escape'||e.code==='Backspace'){state='menu'}
if(e.code==='ArrowUp'||e.code==='ArrowDown'){
const opts=['auto','on','off'];
const ci=opts.indexOf(saveData.showTouch);
saveData.showTouch=opts[(ci+1)%3];
writeSave();updateTouchVis();
}
return;
}
if(state!=='play')return;
switch(e.code){
case'ArrowUp':case'KeyW':e.preventDefault();setLane(0);break;
case'ArrowDown':case'KeyS':e.preventDefault();setLane(1);break;
case'Space':e.preventDefault();doJump();break;
case'KeyN':case'KeyF':case'ShiftLeft':case'ShiftRight':e.preventDefault();activateNitro();break;
case'Escape':state='menu';break;
}
});
addEventListener('keyup',e=>{keys[e.code]=false});

let touchBtns={up:false,down:false,jump:false,nos:false};
function setupTouchBtn(id,key){
const el=document.getElementById(id);
const onDown=e=>{e.preventDefault();e.stopPropagation();touchBtns[key]=true;el.classList.add('pressed');
if(state==='play'){
if(key==='up')setLane(0);
if(key==='down')setLane(1);
if(key==='jump')doJump();
if(key==='nos')activateNitro();
}};
const onUp=e=>{e.preventDefault();e.stopPropagation();touchBtns[key]=false;el.classList.remove('pressed')};
el.addEventListener('touchstart',onDown,{passive:false});
el.addEventListener('touchend',onUp,{passive:false});
el.addEventListener('touchcancel',onUp,{passive:false});
el.addEventListener('mousedown',onDown);
el.addEventListener('mouseup',onUp);
el.addEventListener('mouseleave',onUp);
}
setupTouchBtn('btn-up','up');
setupTouchBtn('btn-down','down');
setupTouchBtn('btn-jump','jump');
setupTouchBtn('btn-nos','nos');

let touchY0=0,touchT0=0,touchHandled=false;
cv.addEventListener('touchstart',e=>{
e.preventDefault();isTouchDevice=true;updateTouchVis();
if(state!=='play'){touchY0=e.touches[0].clientY;touchT0=performance.now();touchHandled=false;return}
touchY0=e.touches[0].clientY;touchT0=performance.now();touchHandled=false;
},{passive:false});
cv.addEventListener('touchend',e=>{
e.preventDefault();
if(touchHandled)return;
if(state==='menu'){menuAction(menuSel);return}
if(state==='select'){
const tx=e.changedTouches[0].clientX;
if(tx<W*.3){curTrack=Math.max(0,curTrack-1)}
else if(tx>W*.7){curTrack=Math.min(TRACKS.length-1,curTrack+1)}
else if(saveData.tracks[curTrack].unlocked){startTournament(curTrack)}
return;
}
if(state==='gameover'||state==='levelcomplete'){afterEndAction();return}
if(state==='settings'){
const opts=['auto','on','off'];
const ci=opts.indexOf(saveData.showTouch);
saveData.showTouch=opts[(ci+1)%3];
writeSave();updateTouchVis();return;
}
},{passive:false});
cv.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

cv.addEventListener('click',e=>{
if(state==='menu'){
const my=e.clientY/H;
if(my>.38&&my<.48)menuAction(0);
else if(my>.50&&my<.60)menuAction(1);
else if(my>.62&&my<.72)menuAction(2);
}
else if(state==='select'){
const mx=e.clientX;
if(mx<W*.3)curTrack=Math.max(0,curTrack-1);
else if(mx>W*.7)curTrack=Math.min(TRACKS.length-1,curTrack+1);
else if(saveData.tracks[curTrack].unlocked)startTournament(curTrack);
}
else if(state==='gameover'||state==='levelcomplete')afterEndAction();
else if(state==='settings'){
const opts=['auto','on','off'];
const ci=opts.indexOf(saveData.showTouch);
saveData.showTouch=opts[(ci+1)%3];
writeSave();updateTouchVis();
}
});

function menuAction(idx){
if(idx===0){mode='freerun';curTrack=0;startGame()}
else if(idx===1){state='select'}
else if(idx===2){state='settings'}
}

function afterEndAction(){
if(mode==='tournament'&&state==='levelcomplete'){
const next=curTrack+1;
if(next<TRACKS.length&&saveData.tracks[next].unlocked){curTrack=next;startTournament(curTrack)}
else{state='select'}
}else if(mode==='tournament'){state='select'}
else{state='menu'}
}

function startGame(){
state='play';score=0;gameTime=0;speedMul=1;distance=0;
coinsCollected=0;overtakeCount=0;maxSpd=0;surviveTime=0;
pLane=0;pY=pTgtY=laneY(0);pJumping=false;pJumpOff=0;pJumpVel=0;
obstacles=[];coins=[];cFx=[];nitroPickups=[];
nitro=30;nitroActive=false;nitroTimer=0;
gear=1;displaySpd=0;
aiCars=[];aiTimer=0;obsTimer=0;coinTimer=0;nitroPickTimer=0;
overtakeFx=[];speedLines=[];fireTrail=[];
shakeAmt=0;flashA=0;
if(TRACKS[curTrack].rain)initRain();else rainDrops=[];
updateTouchVis();
}

function startTournament(idx){
curTrack=idx;mode='tournament';startGame();
}

function setLane(l){if(pLane!==l){pLane=l;pTgtY=laneY(l)}}
function doJump(){if(!pJumping){pJumping=true;pJumpVel=-420}}

function activateNitro(){
if(nitro>=100&&!nitroActive){
nitroActive=true;nitroTimer=3.5;
shakeAmt=Math.max(shakeAmt,.3);
flashA=.15;flashC='0,180,255';
}
}

function endGame(){
state='gameover';
if(mode==='freerun'&&score>saveData.bestFreeRun){saveData.bestFreeRun=Math.floor(score);writeSave()}
shakeAmt=.6;flashA=.5;flashC='255,50,30';
}

function completeLevel(){
state='levelcomplete';
const td=saveData.tracks[curTrack];
const sc=Math.floor(score);
let earned=0;
const th=TRACKS[curTrack].stars;
if(sc>=th[0])earned=1;if(sc>=th[1])earned=2;if(sc>=th[2])earned=3;
if(earned>td.stars)td.stars=earned;
if(sc>td.best)td.best=sc;
td.unlocked=true;
if(curTrack+1<TRACKS.length)saveData.tracks[curTrack+1].unlocked=true;
writeSave();
shakeAmt=0;flashA=.3;flashC='255,220,100';
}

function TH(){return TRACKS[curTrack].theme?TRACKS[curTrack]:TRACKS[curTrack]}

function initRain(){
rainDrops=[];
for(let i=0;i<120;i++){
rainDrops.push({x:Math.random()*1.2-.1,y:Math.random(),sp:.012+Math.random()*.008,len:8+Math.random()*12});
}
}

function spawnObs(){
const sc=Math.min(W,H)/850;
const diff=TRACKS[curTrack].diff||1;
if(gameTime>20&&Math.random()<Math.min(.22,(gameTime-20)*.003*diff)){
const ts=['rock','cone','barrier'];
const tp=ts[Math.floor(Math.random()*ts.length)];
const d=OD[tp];
obstacles.push({x:W+80,lane:0,y:laneY(0),type:tp,w:d.w*sc,h:d.h*sc});
obstacles.push({x:W+80,lane:1,y:laneY(1),type:tp,w:d.w*sc,h:d.h*sc});
return;
}
const types=['rock','cone','barrier'];
const tp=types[Math.floor(Math.random()*types.length)];
const d=OD[tp];
const lane=Math.random()<.5?0:1;
obstacles.push({x:W+80,lane,y:laneY(lane),type:tp,w:d.w*sc,h:d.h*sc});
}

function spawnCoin(){
const sc=Math.min(W,H)/850;
const lane=Math.random()<.5?0:1;
coins.push({x:W+60,lane,y:laneY(lane),r:11*sc});
if(Math.random()<.35){for(let i=1;i<4;i++)coins.push({x:W+60+i*38*sc,lane,y:laneY(lane),r:11*sc})}
}

function spawnNitroPickup(){
const sc=Math.min(W,H)/850;
const lane=Math.random()<.5?0:1;
nitroPickups.push({x:W+60,lane,y:laneY(lane),r:14*sc,pulse:Math.random()*6.28});
}

function spawnAiCar(){
const sc=Math.min(W,H)/850;
const lane=Math.random()<.5?0:1;
const col=AI_COLORS[Math.floor(Math.random()*AI_COLORS.length)];
const spdRatio=.45+Math.random()*.35;
aiCars.push({
x:W+200+Math.random()*200,lane,y:laneY(lane),tgtY:laneY(lane),
color:col,spdRatio,overtaken:false,
laneTimer:3+Math.random()*5,w:110*sc,h:44*sc
});
}

function spawnCFx(x,y){
for(let i=0;i<10;i++){
const a=(i/10)*6.2832;
cFx.push({x,y,vx:Math.cos(a)*130+(Math.random()-.5)*70,vy:Math.sin(a)*130+(Math.random()-.5)*70,life:1,sz:2+Math.random()*3.5});
}
}

function spawnOvertakeFx(x,y){
overtakeFx.push({x,y:y-40,life:1.2,text:'OVERTAKE!',score:200});
overtakeFx.push({x:x+20,y:y-20,life:1,text:'+200',score:0});
}

function updateGame(dt,spd){
const diff=TRACKS[curTrack].diff||1;
gameTime+=dt;surviveTime+=dt;
speedMul=1+gameTime*.006*diff;
if(speedMul>2.8)speedMul=2.8;

let effSpd=spd;
if(nitroActive){
nitroTimer-=dt;
effSpd*=1.6;
nitro-=dt*30;
if(nitroTimer<=0||nitro<=0){nitroActive=false;nitroTimer=0;nitro=Math.max(0,nitro)}
for(let i=0;i<3;i++){
fireTrail.push({x:W*.3-120*(Math.min(W,H)/850),y:pY+pJumpOff+(Math.random()-.5)*15,
vx:-200-Math.random()*150,vy:(Math.random()-.5)*60,life:1,sz:3+Math.random()*5,
hue:Math.random()<.3?200:Math.random()<.5?30:50});
}
if(Math.random()<.4){
speedLines.push({x:W+10,y:Math.random()*H,len:60+Math.random()*120,life:1,sp:800+Math.random()*400});
}
}

const curSpd=effSpd*.3;
if(curSpd>displaySpd)displaySpd+=(curSpd-displaySpd)*Math.min(1,4*dt);
else displaySpd+=(curSpd-displaySpd)*Math.min(1,8*dt);
if(displaySpd>maxSpd)maxSpd=displaySpd;

if(displaySpd<80)gear=1;
else if(displaySpd<130)gear=2;
else if(displaySpd<190)gear=3;
else if(displaySpd<260)gear=4;
else if(displaySpd<340)gear=5;
else gear=6;

score+=dt*100*speedMul*(nitroActive?1.5:1);
distance+=effSpd*dt*.1;

if(mode==='tournament'&&distance>=TRACKS[curTrack].target){completeLevel();return}

pY+=(pTgtY-pY)*Math.min(1,12*dt);
if(pJumping){pJumpOff+=pJumpVel*dt;pJumpVel+=1050*dt;if(pJumpOff>=0){pJumpOff=0;pJumping=false;pJumpVel=0}}

obsTimer+=dt;
const oi=Math.max(.45,1.6-gameTime*.01*diff);
if(obsTimer>=oi){obsTimer=0;spawnObs()}

coinTimer+=dt;
if(coinTimer>=.9+Math.random()*.6){coinTimer=0;spawnCoin()}

nitroPickTimer+=dt;
if(nitroPickTimer>=4+Math.random()*3){nitroPickTimer=0;spawnNitroPickup()}

aiTimer+=dt;
const aiInterval=Math.max(2,4.5-gameTime*.02);
if(aiTimer>=aiInterval&&aiCars.length<5){aiTimer=0;spawnAiCar()}

for(let i=obstacles.length-1;i>=0;i--){obstacles[i].x-=effSpd*dt;if(obstacles[i].x<-200)obstacles.splice(i,1)}
for(let i=coins.length-1;i>=0;i--){coins[i].x-=effSpd*dt;if(coins[i].x<-60)coins.splice(i,1)}
for(let i=nitroPickups.length-1;i>=0;i--){nitroPickups[i].x-=effSpd*dt;if(nitroPickups[i].x<-60)nitroPickups.splice(i,1)}

for(let i=aiCars.length-1;i>=0;i--){
const a=aiCars[i];
a.x-=(effSpd-effSpd*a.spdRatio)*dt;
a.y+=(a.tgtY-a.y)*Math.min(1,6*dt);
a.laneTimer-=dt;
if(a.laneTimer<=0){a.laneTimer=3+Math.random()*5;a.lane=a.lane===0?1:0;a.tgtY=laneY(a.lane)}
if(a.x<-250){aiCars.splice(i,1);continue}
const carX=W*.3;
if(!a.overtaken&&a.x<carX+30){
a.overtaken=true;overtakeCount++;score+=200;
spawnOvertakeFx(a.x,a.y);
shakeAmt=Math.max(shakeAmt,.15);
}
}

const sc=Math.min(W,H)/850;
const carX=W*.3;
const carCY=pY+pJumpOff-30*sc;
const chw=72*sc,chh=22*sc;

for(const o of obstacles){
const oCY=o.y-o.h*.5;
if(Math.abs(carX-o.x)<chw+o.w*.42&&Math.abs(carCY-oCY)<chh+o.h*.42){endGame();return}
}

for(let i=coins.length-1;i>=0;i--){
const c=coins[i];
const ccY=c.y-15*sc;
if(Math.abs(carX-c.x)<chw+c.r*1.5&&Math.abs(carCY-ccY)<chh+c.r*1.5){
score+=100;coinsCollected++;nitro=Math.min(100,nitro+5);
spawnCFx(c.x,ccY);coins.splice(i,1);
}
}

for(let i=nitroPickups.length-1;i>=0;i--){
const n=nitroPickups[i];
const ny=n.y-15*sc;
if(Math.abs(carX-n.x)<chw+n.r*1.8&&Math.abs(carCY-ny)<chh+n.r*1.8){
nitro=Math.min(100,nitro+30);
flashA=.1;flashC='0,200,255';
shakeAmt=Math.max(shakeAmt,.1);
for(let j=0;j<15;j++){
const a2=(j/15)*6.2832;
cFx.push({x:n.x,y:ny,vx:Math.cos(a2)*160,vy:Math.sin(a2)*160,life:1,sz:3+Math.random()*4});
}
nitroPickups.splice(i,1);
}
}

for(const a of aiCars){
if(Math.abs(carX-a.x)<chw+a.w*.35&&Math.abs(carCY-(a.y-a.h*.3))<chh+a.h*.35){
endGame();return;
}
}

updateTouchVis();
}

function roundRect(x,y,w,h,r){
cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);
cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);
cx.closePath();cx.fill();
}

['TIME',`${Math.floor(surviveTime)}s`]
];
cx.font=`${sf}px 'Segoe UI',Arial,sans-serif`;
for(const[label,val]of stats){
cx.fillStyle='rgba(255,255,255,0.45)';cx.textAlign='right';
cx.fillText(label,W/2-15,y0);
cx.fillStyle='rgba(255,220,160,0.8)';cx.textAlign='left';
cx.fillText(val,W/2+15,y0);
y0+=lh;
}

cx.textAlign='center';
const hasNext=curTrack+1<TRACKS.length&&saveData.tracks[curTrack+1].unlocked;
const pulse=.35+.65*Math.sin(t*2.5);
cx.fillStyle=`rgba(255,220,160,${pulse})`;
cx.font=`${Math.max(12,W*.014)}px 'Segoe UI',Arial,sans-serif`;
cx.fillText(hasNext?'TAP or ENTER for next track':'TAP or ENTER to return',W/2,H*.9);
cx.restore();
}

function drawLaneHint(){
if(state!=='play')return;
const sc=Math.min(W,H)/850;
const carX=W*.3;
const ind=pLane===0?laneY(0)-45*sc:laneY(1)-45*sc;
cx.save();cx.globalAlpha=.12+.04*Math.sin(t*4);
cx.strokeStyle='#ffd060';cx.lineWidth=2;cx.setLineDash([4,4]);
cx.beginPath();cx.moveTo(carX-90*sc,ind+60*sc);cx.lineTo(carX+100*sc,ind+60*sc);cx.stroke();
cx.setLineDash([]);cx.restore();
}

let last=0;

function frame(ts){
const dt=Math.min((ts-last)/1000,.04);
last=ts;t+=dt;

let spd;
if(state==='play'){
spd=baseSpd*speedMul;
}else if(state==='gameover'||state==='levelcomplete'){
speedMul*=Math.pow(.08,dt);if(speedMul<.015)speedMul=.015;
spd=baseSpd*speedMul;
}else{
spd=140*(1+Math.sin(t*.25)*.04);
}

let effSpd=spd;
if(state==='play'&&nitroActive)effSpd*=1.6;

scroll+=effSpd*dt;
wheelAng-=effSpd*dt*.065;

if(state==='play')updateGame(dt,spd);

for(let i=cFx.length-1;i>=0;i--){
cFx[i].x+=cFx[i].vx*dt;cFx[i].y+=cFx[i].vy*dt;cFx[i].life-=dt*2.5;
if(cFx[i].life<=0)cFx.splice(i,1);
}
if(shakeAmt>0){shakeAmt-=dt*1.8;if(shakeAmt<0)shakeAmt=0}
if(flashA>0){flashA-=dt*1.5;if(flashA<0)flashA=0}

cx.save();
if(shakeAmt>0||(state==='play'&&nitroActive)){
const shake=shakeAmt+(nitroActive?.02:0);
cx.translate((Math.random()-.5)*shake*22,(Math.random()-.5)*shake*16);
}
cx.clearRect(-30,-30,W+60,H+60);

const tk=TH();
drawSky();drawStars();drawSun();drawClouds();drawBirds();
drawMountainLayer(scroll*.06,7.3,tk.mtC[0],H*.14,roadY-H*.18);
drawMountainLayer(scroll*.12,3.1,tk.mtC[1],H*.11,roadY-H*.10);
drawHaze(roadY-H*.25,roadY,.03);
drawHillLayer(scroll*.22,11.7,tk.hillC[0],H*.08,roadY-H*.05);
drawHillLayer(scroll*.32,19.3,tk.hillC[1],H*.06,roadY-H*.01);
drawFarTreeLine(scroll*.38);
drawPowerPoles(scroll*.7);
drawRoad();drawRoadMarkings(scroll*1.0);drawGrass(scroll*.8);drawBushes(scroll*.85);
drawLaneHint();
drawObstacles();drawCoins();drawNitroPickups();
drawAiCars();

const carPx=W*.3;
const carPy=state==='menu'||state==='select'||state==='settings'?laneY(0):pY+pJumpOff;
const carSc=Math.min(W,H)/850;
updateDust(dt,carPx,carPy,carSc);
drawDust();
drawFireTrail(dt);
drawCar(carPx,carPy);
drawCFx();
drawSpeedLines(dt);
drawOvertakeFx(dt);
drawRain(dt);
drawVignette();
drawNitroScreenFx();

if(flashA>0){cx.fillStyle=`rgba(${flashC},${flashA})`;cx.fillRect(-30,-30,W+60,H+60)}
cx.restore();

drawHUD();
if(state==='menu')drawMenu();
else if(state==='select')drawTrackSelect();
else if(state==='settings')drawSettings();
else if(state==='gameover')drawGameOver();
else if(state==='levelcomplete')drawLevelComplete();

requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
