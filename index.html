.cb.nos{border-color:rgba(255,140,0,0.25);color:rgba(255,140,0,0.8);background:rgba(255,140,0,0.05);font-size:12px;font-weight:800}

function startBGM(themeIdx){
if(!audioCtx||bgmPlaying||soundMuted)return;bgmPlaying=true;bgmBar=0;
bgmThemeIdx=themeIdx!==undefined?themeIdx:0;
const ctx=audioCtx,out=mOut(),distCurve=mkDist(8);
function loop(){
if(!bgmPlaying||soundMuted)return;
const th=BGM_THEMES[bgmThemeIdx]||BGM_THEMES[0];
const now=ctx.currentTime,beat=60/th.bpm,bar=beat*8;
const ph=bgmBar%4,pm=[.65,.85,1,.9][ph];
bgmBar++;
for(let i=0;i<8;i++){if(!th.ki[i])continue;const t=now+i*beat;
const ko=ctx.createOscillator(),kg=ctx.createGain();
ko.type='sine';ko.frequency.setValueAtTime(160,t);ko.frequency.exponentialRampToValueAtTime(35,t+0.1);
kg.gain.setValueAtTime(th.kV*pm,t);kg.gain.exponentialRampToValueAtTime(0.001,t+0.18);
ko.connect(kg);kg.connect(out);ko.start(t);ko.stop(t+0.2);
const kn=ctx.createBufferSource(),kb=ctx.createBuffer(1,Math.max(1,ctx.sampleRate*0.012|0),ctx.sampleRate),kd=kb.getChannelData(0);
for(let j=0;j<kd.length;j++)kd[j]=Math.random()*2-1;kn.buffer=kb;
const kng=ctx.createGain();kng.gain.setValueAtTime(th.kV*.35*pm,t);kng.gain.exponentialRampToValueAtTime(0.001,t+0.015);
kn.connect(kng);kng.connect(out);kn.start(t);kn.stop(t+0.02);
const ks=ctx.createOscillator(),ksg=ctx.createGain();
ks.type='sine';ks.frequency.setValueAtTime(55,t);ks.frequency.exponentialRampToValueAtTime(25,t+0.12);
ksg.gain.setValueAtTime(th.kV*.5*pm,t);ksg.gain.exponentialRampToValueAtTime(0.001,t+0.18);
ks.connect(ksg);ksg.connect(out);ks.start(t);ks.stop(t+0.2)}
if(ph>=1){for(let i=0;i<8;i++){if(!th.sn[i])continue;const t=now+i*beat;
const sn=ctx.createBufferSource(),sb=ctx.createBuffer(1,Math.max(1,ctx.sampleRate*0.07|0),ctx.sampleRate),sd=sb.getChannelData(0);
for(let j=0;j<sd.length;j++)sd[j]=Math.random()*2-1;sn.buffer=sb;
const sg=ctx.createGain(),sf=ctx.createBiquadFilter();sf.type='bandpass';sf.frequency.value=1200;sf.Q.value=1.5;
sg.gain.setValueAtTime(th.sV*pm,t);sg.gain.exponentialRampToValueAtTime(0.001,t+0.11);
sn.connect(sf);sf.connect(sg);sg.connect(out);sn.start(t);sn.stop(t+0.12);
const so=ctx.createOscillator(),sog=ctx.createGain();so.type='triangle';
so.frequency.setValueAtTime(200,t);so.frequency.exponentialRampToValueAtTime(120,t+0.04);
sog.gain.setValueAtTime(th.sV*.4*pm,t);sog.gain.exponentialRampToValueAtTime(0.001,t+0.06);
so.connect(sog);sog.connect(out);so.start(t);so.stop(t+0.07)}}
for(let i=0;i<16;i++){const t=now+i*beat/2;
const hn=ctx.createBufferSource(),hb=ctx.createBuffer(1,Math.max(1,ctx.sampleRate*0.025|0),ctx.sampleRate),hd=hb.getChannelData(0);
for(let j=0;j<hd.length;j++)hd[j]=Math.random()*2-1;hn.buffer=hb;
const hg=ctx.createGain(),hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=8500;
const acc=i%4===0?1:i%2===0?.5:.3;const hpm=ph===0?.5:ph===1?.75:1;
hg.gain.setValueAtTime(th.hV*acc*pm*hpm,t);hg.gain.exponentialRampToValueAtTime(0.001,t+0.022);
hn.connect(hp);hp.connect(hg);hg.connect(out);hn.start(t);hn.stop(t+0.03)}
for(let i=0;i<8;i++){const t=now+i*beat;
const bo=ctx.createOscillator(),bg=ctx.createGain(),bf=ctx.createBiquadFilter();
const ws=ctx.createWaveShaper();ws.curve=distCurve;ws.oversample='2x';
bo.type=th.bT;bo.frequency.value=th.bass[i];
bf.type='lowpass';bf.frequency.value=th.fF;bf.Q.value=th.fQ;
if(th.ki[i]){bg.gain.setValueAtTime(0.001,t);bg.gain.linearRampToValueAtTime(th.bV*pm,t+beat*.25)}
else{bg.gain.setValueAtTime(th.bV*pm,t)}
bg.gain.setValueAtTime(th.bV*.7*pm,t+beat*.85);bg.gain.exponentialRampToValueAtTime(0.001,t+beat*.97);
bo.connect(ws);ws.connect(bf);bf.connect(bg);bg.connect(out);bo.start(t);bo.stop(t+beat)}
const chSet=th.ch[bgmBar%th.ch.length];
for(const freq of chSet){
const o1=ctx.createOscillator(),o2=ctx.createOscillator(),pg=ctx.createGain(),pf=ctx.createBiquadFilter();
o1.type=th.pT;o2.type=th.pT;o1.frequency.value=freq;o2.frequency.value=freq;
o1.detune.value=th.dt;o2.detune.value=-th.dt;
pf.type='lowpass';pf.frequency.value=th.fF*2.5;pf.Q.value=0.7;
const cv=th.cV*pm*(ph===0?.4:1);
pg.gain.setValueAtTime(0,now);pg.gain.linearRampToValueAtTime(cv,now+beat*1.5);
pg.gain.setValueAtTime(cv*.85,now+bar*.7);pg.gain.exponentialRampToValueAtTime(0.001,now+bar*.97);
o1.connect(pf);o2.connect(pf);pf.connect(pg);pg.connect(out);o1.start(now);o2.start(now);o1.stop(now+bar);o2.stop(now+bar)}
if(th.arp){const al=th.arp.length,apm=ph===0?.35:ph===1?.65:ph===3?.55:1;
for(let i=0;i<16;i++){const t=now+i*beat/2;
const ao=ctx.createOscillator(),ag=ctx.createGain();
ao.type='sine';ao.frequency.value=th.arp[i%al];
ag.gain.setValueAtTime(0,t);ag.gain.linearRampToValueAtTime(th.aV*pm*apm,t+0.01);
ag.gain.exponentialRampToValueAtTime(0.001,t+beat/2*.7);
ao.connect(ag);ag.connect(out);ao.start(t);ao.stop(t+beat/2)}}
if(ph>=1){const notes=bgmBar%2===0?th.mel:th.mel2;
const mpm=ph===1?.45:ph===3?.65:1;
for(const[freq,start,dur]of notes){const t=now+start*beat,d=dur*beat;
const mo=ctx.createOscillator(),mo2=ctx.createOscillator(),mg=ctx.createGain();
const lfo=ctx.createOscillator(),lfoG=ctx.createGain();
mo.type=th.lT;mo2.type=th.lT;mo.frequency.value=freq;mo2.frequency.value=freq;
mo.detune.value=th.dt*1.5;mo2.detune.value=-th.dt*1.5;
lfo.type='sine';lfo.frequency.value=5.5;lfoG.gain.value=3.5;
lfo.connect(lfoG);lfoG.connect(mo.frequency);lfoG.connect(mo2.frequency);
const mv=th.mV*pm*mpm;
mg.gain.setValueAtTime(0,t);mg.gain.linearRampToValueAtTime(mv,t+0.035);
if(d>beat*.8)mg.gain.setValueAtTime(mv*.8,t+d*.75);
mg.gain.exponentialRampToValueAtTime(0.001,t+d*.97);
mo.connect(mg);mo2.connect(mg);mg.connect(out);
lfo.start(t);mo.start(t);mo2.start(t);lfo.stop(t+d);mo.stop(t+d);mo2.stop(t+d)}}
bgmTimer=setTimeout(loop,bar*1000-30)}
loop()}
function stopBGM(){bgmPlaying=false;bgmBar=0;if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null}}
function switchBGMTheme(newIdx){if(newIdx===bgmThemeIdx)return;const was=bgmPlaying;stopBGM();if(was&&!soundMuted)startBGM(newIdx)}

function startEngine(){
if(!audioCtx||engineOsc)return;const out=mOut();
engineOsc=audioCtx.createOscillator();engineOsc.type='sawtooth';engineOsc.frequency.value=50;
engineOsc2=audioCtx.createOscillator();engineOsc2.type='square';engineOsc2.frequency.value=50.5;

function fract(x){return x-Math.floor(x)}
function hash(n){return fract(Math.sin(n*127.1)*43758.5453)}
function noise(x){const i=Math.floor(x),f=x-i,u=f*f*(3-2*f);return hash(i)*(1-u)+hash(i+1)*u}
function fbm(x,oct,seed){let v=0,a=.5,f=1;for(let i=0;i<oct;i++){v+=noise(x*f+seed)*a;f*=2.03;a*=.5}return v}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return v<mn?mn:v>mx?mx:v}
function getEnvIdx(d){for(let i=0;i<ENVS.length;i++)if(d<ENVS[i].end)return i;return ENVS.length-1}
function getDayPhase(d){return clamp(d/14000,0,1)}
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function rgbHex(r,g,b){return'#'+[r,g,b].map(v=>clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join('')}
function lerpHex(a,b,tt){const ca=hexRgb(a),cb=hexRgb(b);return rgbHex(lerp(ca[0],cb[0],tt),lerp(ca[1],cb[1],tt),lerp(ca[2],cb[2],tt))}

curTrack=idx;mode='tournament';startGame();
state='countdown';countdownTimer=4;prevCountdownSec=4;
raceTotal=4;racePosition=4;prevPosition=4;
const npcLanes=[0,2,3],npcColors=['#c43030','#2a7a40','#3060a0'];
const diff=TRACKS[curTrack].diff||1;
raceNPCs=[];
for(let i=0;i<3;i++){
raceNPCs.push({lane:npcLanes[i],y:lanes[npcLanes[i]],color:npcColors[i],style:i,
raceDistance:0,speedFactor:0.82+Math.random()*0.25+diff*0.06,
currentSpeed:0,spdTimer:3+Math.random()*4,accelRate:1.2+Math.random()*1.5});
}

}

function activateNitro(){
if(nitro>=100&&!nitroActive){
nitroActive=true;nitroTimer=3.5;playNitroSound();
shakeAmt=Math.max(shakeAmt,.3);flashA=.15;flashC='255,180,60';
}}

function endGame(){
state='gameover';playCrashSound();stopBGM();stopEngineSound();
if(mode==='freerun'&&score>saveData.bestFreeRun){saveData.bestFreeRun=Math.floor(score);writeSave()}
shakeAmt=.6;flashA=.5;flashC='255,50,30';
document.getElementById('ctrl').classList.remove('show');
}

function completeLevel(){
state='levelcomplete';stopBGM();stopEngineSound();
const td=saveData.tracks[curTrack],sc=Math.floor(score);
let earned=0;const th=TRACKS[curTrack].stars;
if(sc>=th[0])earned=1;if(sc>=th[1])earned=2;if(sc>=th[2])earned=3;
if(earned>td.stars)td.stars=earned;
if(sc>td.best)td.best=sc;
td.unlocked=true;
if(curTrack+1<TRACKS.length)saveData.tracks[curTrack+1].unlocked=true;
writeSave();shakeAmt=0;flashA=.3;flashC='255,220,100';
document.getElementById('ctrl').classList.remove('show');
}

obstacles.push({x:W+600,y,type:tp,w:d.w*sc,h:d.h*sc,nearMissed:false});

let lane2=lane;while(lane2===lane)lane2=Math.floor(Math.random()*LANE_COUNT);
obstacles.push({x:W+600+Math.random()*100,y:lanes[lane2],type:tp,w:d.w*sc,h:d.h*sc,nearMissed:false});

function updateGame(dt,spd){
if(mode==='tournament'&&finishTriggered){
finishAnimTimer-=dt;gameTime+=dt;
speedMul*=Math.pow(0.08,dt);if(speedMul<0.02)speedMul=0.02;
distance+=spd*dt*0.1;
const curSpd=spd*.3;displaySpd+=(curSpd-displaySpd)*Math.min(1,8*dt);
for(const npc of raceNPCs){npc.currentSpeed*=Math.pow(0.08,dt);npc.raceDistance+=npc.currentSpeed*dt*0.1}
if(finishAnimTimer<=0)completeLevel();
return;
}
const diff=TRACKS[curTrack].diff||1;
gameTime+=dt;surviveTime+=dt;
speedMul=1+gameTime*.008*diff;
if(speedMul>3.8)speedMul=3.8;

let effSpd=spd;
if(speedPenalty>0){speedPenalty-=dt;effSpd*=0.45}
if(activePU.speed>0)effSpd*=1.8;
if(nitroActive){
nitroTimer-=dt;effSpd*=2.5;nitro-=dt*30;
if(nitroTimer<=0||nitro<=0){nitroActive=false;nitroTimer=0;nitro=Math.max(0,nitro)}
for(let i=0;i<5;i++){
fireTrail.push({x:W*.3-120*(Math.min(W,H)/850),y:pY+(Math.random()-.5)*18,
vx:-280-Math.random()*200,vy:(Math.random()-.5)*80,life:1,sz:4+Math.random()*7,
hue:Math.random()<.5?30:50});
}
if(Math.random()<.6)speedLines.push({x:W+10,y:Math.random()*H,len:80+Math.random()*180,life:1,sp:1000+Math.random()*600});
}else if(speedMul>1.8&&Math.random()<speedMul*0.04){
speedLines.push({x:W+10,y:Math.random()*H,len:30+Math.random()*60,life:1,sp:500+Math.random()*300});
}

const curSpd=effSpd*.3;
if(curSpd>displaySpd)displaySpd+=(curSpd-displaySpd)*Math.min(1,4*dt);
else displaySpd+=(curSpd-displaySpd)*Math.min(1,8*dt);
if(displaySpd>maxSpd)maxSpd=displaySpd;
gear=displaySpd<120?1:displaySpd<200?2:displaySpd<300?3:displaySpd<420?4:displaySpd<560?5:6;

score+=dt*100*speedMul*(nitroActive?1.5:1);
distance+=effSpd*dt*.1;
if(mode==='freerun'){const ni=getEnvIdx(distance);if(ni!==curEnvIdx){curEnvIdx=ni;envWelcomeTimer=3;snowPs=[];petalPs=[];dataPs=[];switchBGMTheme(ni)}}
if(envWelcomeTimer>0)envWelcomeTimer-=dt;
if(mode==='tournament'&&!finishTriggered&&distance>=RACE_DIST){finishTriggered=true;finishAnimTimer=2.5;shakeAmt=.5;flashA=.4;flashC='255,220,100'}

if(laneSwitchCooldown>0)laneSwitchCooldown-=dt;
if(holdUp&&laneSwitchCooldown<=0&&currentLane>0){currentLane--;laneSwitchCooldown=0.16}
if(holdDown&&laneSwitchCooldown<=0&&currentLane<LANE_COUNT-1){currentLane++;laneSwitchCooldown=0.16}
const targetLaneY=lanes[currentLane];
pY+=(targetLaneY-pY)*Math.min(1,16*dt);
if(activePU.jet>0){isJumping=true;jumpHeight+=(120-jumpHeight)*Math.min(1,6*dt);jumpVel=0}
else if(isJumping){jumpVel-=JUMP_GRAVITY*dt;jumpHeight+=jumpVel*dt;if(jumpHeight<=0){jumpHeight=0;jumpVel=0;isJumping=false;playLandSound()}}

obsTimer+=dt;
const oi=Math.max(.45,1.6-gameTime*.01*diff);
if(obsTimer>=oi){obsTimer=0;spawnObs()}

coinTimer+=dt;
if(coinTimer>=.9+Math.random()*.6){coinTimer=0;spawnCoin()}

nitroPickTimer+=dt;
if(nitroPickTimer>=4+Math.random()*3){nitroPickTimer=0;spawnNitroPickup()}

powerupTimer+=dt;
const puInt=Math.max(4,12-distance*0.0006);
if(distance>500&&powerupTimer>=puInt){powerupTimer=0;spawnPowerup()}

for(const pk of Object.keys(activePU)){if(activePU[pk]>0)activePU[pk]-=dt;if(activePU[pk]<0)activePU[pk]=0}
if(activePU.autoNitro>0)nitro=Math.min(100,nitro+18*dt);

if(mode!=='tournament'){aiTimer+=dt;
const aiInterval=Math.max(1.8,4-gameTime*.02);
if(aiTimer>=aiInterval&&aiCars.length<6){aiTimer=0;spawnAiCar()}}

for(let i=obstacles.length-1;i>=0;i--){obstacles[i].x-=effSpd*dt;if(obstacles[i].x<-200)obstacles.splice(i,1)}
for(let i=coins.length-1;i>=0;i--){coins[i].x-=effSpd*dt;if(coins[i].x<-60)coins.splice(i,1)}
for(let i=nitroPickups.length-1;i>=0;i--){nitroPickups[i].x-=effSpd*dt;if(nitroPickups[i].x<-60)nitroPickups.splice(i,1)}
for(let i=powerups.length-1;i>=0;i--){powerups[i].x-=effSpd*dt;if(powerups[i].x<-80)powerups.splice(i,1)}

const carX=W*.3;
for(let i=aiCars.length-1;i>=0;i--){
const a=aiCars[i];
if(a.smashed){
a.x+=a.smashVx*dt;a.y+=a.smashVy*dt;a.smashVy+=400*dt;
a.smashRot+=a.smashRotSpd*dt;a.smashLife-=dt*1.5;
if(a.smashLife<=0||a.y>H+200){aiCars.splice(i,1)}
continue}
if(a.fromBehind)a.x+=(effSpd*a.spdRatio-effSpd)*dt+effSpd*dt*0.3;
else a.x-=(effSpd-effSpd*a.spdRatio)*dt;
a.y+=(a.tgtY-a.y)*Math.min(1,8*dt);
if(a.entryAlpha!==undefined&&a.entryAlpha<1)a.entryAlpha=Math.min(1,a.entryAlpha+dt*2.5);
if(a.entryScale!==undefined&&a.entryScale<1)a.entryScale=Math.min(1,a.entryScale+dt*0.8);
a.yTimer-=dt;
if(a.laneSwitchTimer!==undefined){a.laneSwitchTimer-=dt;
if(a.laneSwitchTimer<=0){a.laneSwitchTimer=2+Math.random()*4;
const dir=Math.random()<0.5?-1:1;a.lane=clamp((a.lane||0)+dir,0,LANE_COUNT-1);a.tgtY=lanes[a.lane]}}
else if(a.yTimer<=0){a.yTimer=2+Math.random()*3;a.tgtY=lanes[Math.floor(Math.random()*LANE_COUNT)]}
a.spdTimer-=dt;
if(a.spdTimer<=0){a.spdTimer=1.5+Math.random()*2;a.spdRatio=a.baseSpdRatio+(Math.random()-.5)*.2}
if(a.x<-500||a.x>W+900){aiCars.splice(i,1);continue}
if(!a.smashed&&a.fromBehind&&a.lane===currentLane&&a.x>carX-200&&a.x<carX-50&&(a.laneSwitchTimer||0)>1){
a.lane=a.lane>0?a.lane-1:a.lane+1;a.tgtY=lanes[a.lane];a.laneSwitchTimer=3+Math.random()*3}
if(!a.smashed&&!a.fromBehind&&a.lane===currentLane&&a.x>carX+80&&a.x<carX+400){
a.lane=a.lane>0?a.lane-1:a.lane+1;a.tgtY=lanes[a.lane];if(a.laneSwitchTimer)a.laneSwitchTimer=3+Math.random()*3}
if(!a.fromBehind&&!a.overtaken&&a.x<carX+30){
a.overtaken=true;overtakeCount++;score+=200;playOvertakeSound();
racePosition=Math.max(1,racePosition-1);
if(racePosition<prevPosition){posChangeFx=1.5;posChangeDir=-1}
prevPosition=racePosition;
spawnOvertakeFx(a.x,a.y,'超车！',200);
shakeAmt=Math.max(shakeAmt,.15);
}
if(a.fromBehind&&!a.passed&&a.x>carX+80){
a.passed=true;
racePosition=Math.min(raceTotal,racePosition+1);
if(racePosition>prevPosition){posChangeFx=1.5;posChangeDir=1}
prevPosition=racePosition;
spawnOvertakeFx(a.x,a.y,'被超越',0);
}}
if(posChangeFx>0)posChangeFx-=dt;
if(mode==='tournament'&&raceNPCs.length>0){
const raceSpd=baseSpd*speedMul;
for(const npc of raceNPCs){
const tgtSpd=raceSpd*npc.speedFactor;
npc.currentSpeed+=(tgtSpd-npc.currentSpeed)*Math.min(1,npc.accelRate*dt);
npc.spdTimer-=dt;
if(npc.spdTimer<=0){npc.spdTimer=2+Math.random()*3;npc.speedFactor+=(Math.random()-.5)*.12;npc.speedFactor=clamp(npc.speedFactor,0.78,1.18)}
if(Math.random()<0.002){const dir=Math.random()<0.5?-1:1;npc.lane=clamp(npc.lane+dir,0,LANE_COUNT-1)}
npc.y+=(lanes[npc.lane]-npc.y)*Math.min(1,8*dt);
npc.raceDistance+=npc.currentSpeed*dt*0.1;
}
let pos=1;for(const npc of raceNPCs){if(npc.raceDistance>distance)pos++}
if(pos!==racePosition){
if(pos<racePosition){posChangeFx=1.5;posChangeDir=-1}else{posChangeFx=1.5;posChangeDir=1}
racePosition=pos;prevPosition=pos;
}}

const sc=Math.min(W,H)/850;
const jOff=jumpHeight*sc;
const carCY=pY-25*sc-jOff;
const chw=65*sc,chh=20*sc;

for(let i=obstacles.length-1;i>=0;i--){
const o=obstacles[i];
if(jumpHeight>35){continue}
const oCY=o.y-o.h*.5;
if(Math.abs(carX-o.x)<chw+o.w*.38&&Math.abs(carCY-oCY)<chh+o.h*.38){
if(nitroActive||activePU.shield>0){
spawnSmashFx(o.x,oCY,o.type);playSmashSound();
obstacles.splice(i,1);
const pts=nitroActive?300:150;
score+=pts;smashCount++;
shakeAmt=Math.max(shakeAmt,.25);flashA=.12;flashC=activePU.shield>0?'80,140,255':'255,200,80';
overtakeFx.push({x:o.x,y:oCY-20,life:1,text:activePU.shield>0?`防护！+${pts}`:`粉碎！+${pts}`,score:0,big:false});
continue;
}
if(mode==='freerun'){endGame();return}
playCrashSound();speedPenalty=1.5;shakeAmt=Math.max(shakeAmt,.35);flashA=.2;flashC='255,80,30';
obstacles.splice(i,1);
overtakeFx.push({x:carX,y:carCY-20,life:1,text:'减速！',score:0,big:false});
continue;
}
if(!o.nearMissed){
const dist=Math.sqrt((carX-o.x)**2+(carCY-oCY)**2);
const hitDist=chw+o.w*.38;
if(dist<hitDist*1.6&&dist>=hitDist){
o.nearMissed=true;score+=50;
overtakeFx.push({x:o.x,y:o.y-40*sc,life:1,text:'惊险！+50',score:0,big:false});
}}}

for(let i=coins.length-1;i>=0;i--){
const c=coins[i],ccY=c.y-12*sc;
if(Math.abs(carX-c.x)<chw+c.r*1.5&&Math.abs(carCY-ccY)<chh+c.r*1.5){
score+=100;coinsCollected++;nitro=Math.min(100,nitro+5);playCoinSound();
spawnCFx(c.x,ccY);coins.splice(i,1);
}}

for(let i=nitroPickups.length-1;i>=0;i--){
const n=nitroPickups[i],ny=n.y-12*sc;
if(Math.abs(carX-n.x)<chw+n.r*1.8&&Math.abs(carCY-ny)<chh+n.r*1.8){
nitro=Math.min(100,nitro+30);flashA=.1;flashC='80,200,60';shakeAmt=Math.max(shakeAmt,.1);
for(let j=0;j<15;j++){const a2=(j/15)*6.2832;cFx.push({x:n.x,y:ny,vx:Math.cos(a2)*160,vy:Math.sin(a2)*160,life:1,sz:3+Math.random()*4})}
nitroPickups.splice(i,1);
}}

for(let i=powerups.length-1;i>=0;i--){
const p=powerups[i],py2=p.y-12*sc;
if(Math.abs(carX-p.x)<chw+p.r*1.8&&Math.abs(carCY-py2)<chh+p.r*1.8){
activatePowerup(p.type);
const col=hexRgb(PU_COLORS[p.type]);
for(let j=0;j<20;j++){const a2=(j/20)*6.2832;cFx.push({x:p.x,y:py2,vx:Math.cos(a2)*200,vy:Math.sin(a2)*200,life:1,sz:3+Math.random()*5})}
powerups.splice(i,1);
}}

for(const a of aiCars){
if(a.smashed)continue;
if(Math.abs(carX-a.x)<chw+a.w*.35&&Math.abs(carCY-(a.y-a.h*.3))<chh+a.h*.35){
if(activePU.shield>0&&!nitroActive){
playCrashSound();shakeAmt=Math.max(shakeAmt,.2);flashA=.12;flashC='80,140,255';
overtakeFx.push({x:carX,y:carCY-20,life:1,text:'防护！',score:0,big:false});
continue;
}
if(nitroActive){
a.smashed=true;playSmashSound();
a.smashVx=(a.x>carX?1:-1)*300+100;
a.smashVy=-250-Math.random()*100;
a.smashRotSpd=(Math.random()-.5)*10;
score+=500;smashCount++;
racePosition=Math.max(1,racePosition-1);
if(racePosition<prevPosition){posChangeFx=1.5;posChangeDir=-1}
prevPosition=racePosition;
spawnSmashFx(a.x,a.y,null);
shakeAmt=Math.max(shakeAmt,.4);flashA=.2;flashC='255,200,80';
overtakeFx.push({x:W*.5,y:H*.35,life:1.2,text:'撞飞！+500',score:500,big:true});
continue;
}
if(mode==='freerun'){endGame();return}
playCrashSound();speedPenalty=1.5;shakeAmt=.3;flashA=.2;flashC='255,80,30';
overtakeFx.push({x:carX,y:carCY-20,life:1,text:'减速！',score:0,big:false});
}}

updateTouchVis();
}

// ====== DRAW SCENERY ======

function drawSky(){
const g=cx.createLinearGradient(0,0,0,roadY);
g.addColorStop(0,'#3890e0');
g.addColorStop(0.1,'#50a0e8');
g.addColorStop(0.25,'#70a8d8');
g.addColorStop(0.4,'#a0b0c0');
g.addColorStop(0.55,'#d8b868');
g.addColorStop(0.68,'#f0c848');
g.addColorStop(0.8,'#f8d860');
g.addColorStop(0.92,'#ffe880');
g.addColorStop(1,'#fffac0');
cx.fillStyle=g;cx.fillRect(0,0,W,roadY+2);
}

function drawStars(){
for(const s of stars){
const a=0.06+0.06*Math.sin(t*1.8+s.tw);
cx.fillStyle=`rgba(255,255,240,${a})`;
cx.beginPath();cx.arc(s.x*W,s.y*H,s.r,0,6.2832);cx.fill();
}}

function drawSun(){
const sx=W*0.68,sy=roadY*0.55;
const sr=Math.min(W,H)*0.06;
const g1=cx.createRadialGradient(sx,sy,sr*0.3,sx,sy,sr*8);
g1.addColorStop(0,'rgba(255,245,200,0.35)');
g1.addColorStop(0.25,'rgba(255,220,130,0.15)');
g1.addColorStop(1,'rgba(255,180,80,0)');
cx.fillStyle=g1;cx.fillRect(0,0,W,roadY+2);
const g2=cx.createRadialGradient(sx,sy,0,sx,sy,sr);
g2.addColorStop(0,'#fffff0');g2.addColorStop(0.6,'#ffe860');g2.addColorStop(1,'#ffc030');
cx.fillStyle=g2;cx.beginPath();cx.arc(sx,sy,sr,0,6.2832);cx.fill();
cx.save();cx.globalAlpha=0.06;cx.strokeStyle='#ffd060';cx.lineWidth=sr*0.25;
for(let i=0;i<14;i++){
const a=(i/14)*6.2832+t*0.04;
const len=sr*(2.5+Math.sin(t*0.7+i*2.1)*0.8);
cx.beginPath();cx.moveTo(sx,sy);cx.lineTo(sx+Math.cos(a)*len,sy+Math.sin(a)*len);cx.stroke();
}cx.restore();
}

function drawClouds(){
for(const c of clouds){
c.x-=c.sp*0.016;if(c.x+c.w<-0.15)c.x=1.15;
const px=c.x*W,py=c.y*H,pw=c.w*W,ph=c.h*H;
cx.fillStyle='rgba(240,240,250,0.25)';
cx.beginPath();cx.ellipse(px,py,pw,ph,0,0,6.2832);cx.fill();

function drawBirds(){

function drawHillLayer(off,seed,color,peakH,baseY){

function drawFarTreeLine(off){

for(const tr of farTrees){
let sx=((tr.pos-off%FARTREE_SPAN)%FARTREE_SPAN+FARTREE_SPAN)%FARTREE_SPAN-40;
if(sx<-50||sx>W+50)continue;
cx.fillStyle='#1a2a18';
if(tr.type==='pine'){
cx.fillRect(sx-1.5,groundY-tr.h*.25,3,tr.h*.25);
for(let j=0;j<3;j++){
const ly=groundY-tr.h*.25-j*tr.h*.25;const lw=tr.w*(1-j*.25);
cx.beginPath();cx.moveTo(sx,ly-tr.h*.3);cx.lineTo(sx-lw,ly);cx.lineTo(sx+lw,ly);cx.closePath();cx.fill();
}}else{

function drawRoadPalms(off){
const groundY=roadY-2;
for(const p of roadPalms){
let sx=((p.pos-off%PALM_SPAN)%PALM_SPAN+PALM_SPAN)%PALM_SPAN-50;
if(sx<-80||sx>W+80)continue;
const h=p.h,lean=p.lean,seed=p.seed;
const topX=sx+lean,topY=groundY-h;
cx.fillStyle='#1a2818';
cx.beginPath();
const bw=4,tw=2.5;
cx.moveTo(sx-bw,groundY);
cx.bezierCurveTo(sx+lean*.25-bw*.6,groundY-h*.4,sx+lean*.6-tw,groundY-h*.8,topX-tw,topY+5);
cx.lineTo(topX+tw,topY+5);
cx.bezierCurveTo(sx+lean*.6+tw,groundY-h*.8,sx+lean*.25+bw*.6,groundY-h*.4,sx+bw,groundY);
cx.closePath();cx.fill();
cx.strokeStyle='rgba(20,30,15,0.25)';cx.lineWidth=0.8;
for(let s=0;s<6;s++){
const st=(s+1)/7,segX=sx+lean*st*st,segY=groundY-h*st;
cx.beginPath();cx.moveTo(segX-3,segY);cx.lineTo(segX+3,segY);cx.stroke();
}
const nf=7;
cx.fillStyle='#1a2818';
for(let i=0;i<nf;i++){
const baseAngle=-Math.PI*.8+(i/(nf-1))*Math.PI*2.1;
const frondLen=h*(0.3+hash(seed+i)*0.1);
const sway=Math.sin(t*1.2+seed*3+i*1.1)*5;
cx.beginPath();cx.moveTo(topX,topY);
const cpx1=topX+Math.cos(baseAngle)*frondLen*.4+sway*.5;
const cpy1=topY+Math.sin(baseAngle)*frondLen*.3-frondLen*.12;
const endX=topX+Math.cos(baseAngle)*frondLen+sway;
const endY=topY+Math.sin(baseAngle)*frondLen*.4+frondLen*.2;
cx.quadraticCurveTo(cpx1,cpy1-3,endX,endY);
cx.quadraticCurveTo(cpx1+2,cpy1+3,topX+1,topY+2);
cx.closePath();cx.fill();
}
for(let i=0;i<3;i++){
cx.beginPath();cx.arc(topX+(i-1)*3,topY+5+i*1.2,2.2,0,6.2832);cx.fill();
}}}

function drawPowerPoles(off){
const pH=H*0.17,crossW=28,baseY=roadY;
for(let i=-1;i<W/POLE_SPACING+2;i++){
const px=i*POLE_SPACING-(off%POLE_SPACING);

cx.strokeStyle='#18180f';cx.lineWidth=4;
cx.beginPath();cx.moveTo(px,baseY);cx.lineTo(px,baseY-pH);cx.stroke();
cx.lineWidth=2.5;
cx.beginPath();cx.moveTo(px-crossW,baseY-pH+6);cx.lineTo(px+crossW,baseY-pH+6);cx.stroke();
cx.beginPath();cx.moveTo(px-crossW*.55,baseY-pH+16);cx.lineTo(px+crossW*.55,baseY-pH+16);cx.stroke();
}
cx.strokeStyle='rgba(25,25,15,0.35)';cx.lineWidth=1;
for(let i=-1;i<W/POLE_SPACING+1;i++){
const p1=i*POLE_SPACING-(off%POLE_SPACING),p2=p1+POLE_SPACING,wy=baseY-pH+6;
for(let w=0;w<2;w++){const wOff=w*10;cx.beginPath();
for(let j=0;j<=24;j++){const fr=j/24,wx=p1+(p2-p1)*fr,sag=4*(fr-.5)*(fr-.5),vy=wy+wOff+(1-sag)*14;
j===0?cx.moveTo(wx,vy):cx.lineTo(wx,vy)}cx.stroke()}}
}

function drawDaySun(dp){
if(dp>.92)return;

function drawDayMoon(){

cx.fillStyle=haze;cx.fillRect(0,roadY-H*0.3,W,H*0.3);

function drawFreerunRoad(envIdx){

else if(envIdx===5){g.addColorStop(0,'#6a6870');g.addColorStop(0.5,'#585860');g.addColorStop(1,'#484850')}
else if(envIdx===7){g.addColorStop(0,'#1a1a28');g.addColorStop(0.5,'#101020');g.addColorStop(1,'#0a0a18')}
else{g.addColorStop(0,'#585450');g.addColorStop(0.08,'#4a4845');g.addColorStop(0.5,'#3a3835');g.addColorStop(1,'#302e2b')}
cx.fillStyle=g;cx.fillRect(0,roadY,W,H-roadY);

cx.beginPath();cx.moveTo(0,roadY+8);cx.lineTo(W,roadY+8);cx.stroke();

cx.fillStyle=rg;cx.fillRect(0,roadY,W,(H-roadY)*0.3)}
if(envIdx===7){cx.strokeStyle=`rgba(0,200,255,${0.15+0.1*Math.sin(t*4)})`;cx.lineWidth=2;
cx.beginPath();cx.moveTo(0,roadLaneTop+laneWidth*LANE_COUNT);cx.lineTo(W,roadLaneTop+laneWidth*LANE_COUNT);cx.stroke()}
}

function updateFreerunParticles(dt,envIdx){
if(envIdx===5){
if(snowPs.length<250&&Math.random()<0.85)snowPs.push({x:Math.random()*W,y:-5,vx:(Math.random()-0.5)*40,vy:50+Math.random()*80,sz:1+Math.random()*4});
for(let i=snowPs.length-1;i>=0;i--){const s=snowPs[i];s.x+=s.vx*dt;s.y+=s.vy*dt;if(s.y>H||s.x<-10||s.x>W+10)snowPs.splice(i,1)}}
if(envIdx===6){
if(petalPs.length<80&&Math.random()<0.4)petalPs.push({x:Math.random()*W+100,y:-5,vx:-20-Math.random()*40,vy:30+Math.random()*50,rot:Math.random()*6.28,rotSpd:1+Math.random()*3,sz:2+Math.random()*4});
for(let i=petalPs.length-1;i>=0;i--){const p=petalPs[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.rotSpd*dt;p.vx+=Math.sin(t+i)*5*dt;if(p.y>H||p.x<-20)petalPs.splice(i,1)}}
if(envIdx===7){
if(dataPs.length<60&&Math.random()<0.3)dataPs.push({x:W+10,y:roadY*0.1+Math.random()*roadY*0.8,vx:-200-Math.random()*300,sz:1+Math.random()*2,hue:(Math.random()*360|0)});
for(let i=dataPs.length-1;i>=0;i--){const d=dataPs[i];d.x+=d.vx*dt;if(d.x<-10)dataPs.splice(i,1)}}
}

function drawFreerunParticles(envIdx){
if(envIdx===5){cx.fillStyle='rgba(240,240,255,0.7)';for(const s of snowPs){cx.beginPath();cx.arc(s.x,s.y,s.sz,0,6.2832);cx.fill()}}
if(envIdx===6){for(const p of petalPs){cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);
cx.fillStyle='rgba(255,180,200,0.7)';cx.beginPath();cx.ellipse(0,0,p.sz,p.sz*0.5,0,0,6.2832);cx.fill();cx.restore()}}
if(envIdx===7){for(const d of dataPs){cx.fillStyle=`hsla(${d.hue},80%,60%,0.6)`;cx.fillRect(d.x,d.y,8,d.sz)}}
}

function drawFreerunScenery(dt){
const dp=getDayPhase(distance);
const envIdx=curEnvIdx;
const off=scroll;
drawDaySky(dp);
if(dp>0.78){cx.save();cx.globalAlpha=clamp((dp-0.78)/0.15,0,1);drawStars();cx.restore()}
if(dp<0.88)drawDaySun(dp);else drawDayMoon();
if(dp<0.85){cx.save();cx.globalAlpha=clamp(1-dp*0.9,0.1,1);drawClouds();cx.restore()}
if(dp<0.6)drawBirds();
switch(envIdx){
case 0:drawEnvPalm(off);break;case 1:drawEnvCity(off,dp);break;
case 2:drawEnvCountry(off);break;case 3:drawEnvDesert(off);break;
case 4:drawEnvCoast(off);break;case 5:drawEnvSnow(off);break;
case 6:drawEnvCherry(off);break;case 7:drawEnvVirtual(off);break;}
drawFreerunRoad(envIdx);
if(envIdx===7){const dashLen=45,gapLen=65,total=dashLen+gapLen;
cx.fillStyle='rgba(0,200,255,0.35)';
for(let li=1;li<LANE_COUNT;li++){const ly=roadLaneTop+laneWidth*li;
for(let j=-1;j<W/total+2;j++)cx.fillRect(j*total-(off%total),ly-1,dashLen,3)}
cx.fillStyle='rgba(0,200,255,0.5)';cx.fillRect(0,roadLaneTop,W,2);cx.fillRect(0,roadLaneTop+laneWidth*LANE_COUNT,W,2);
}else{drawRoadMarkings(off)}
updateFreerunParticles(dt,envIdx);
}

}

switch(o.type){

cx.lineTo(x+10*sc,y+8*sc);cx.closePath();cx.fill();
cx.fillStyle='rgba(255,80,30,0.4)';cx.beginPath();
cx.moveTo(x-5*sc,y-18*sc);cx.lineTo(x+2*sc,y-36*sc);cx.lineTo(x+8*sc,y-20*sc);cx.closePath();cx.fill();
break;
case'cone':
cx.fillStyle='#555';cx.fillRect(x-16*sc,y-4*sc,32*sc,8*sc);

function roundRect(x,y,w,h,r){
cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);
cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}

function drawGlassPanel(x,y,w,h,r,bc){
cx.fillStyle='rgba(20,15,10,0.55)';roundRect(x,y,w,h,r);cx.fill();
cx.strokeStyle=bc||'rgba(230,180,80,0.18)';cx.lineWidth=1;roundRect(x,y,w,h,r);cx.stroke();
}

['时间',`${Math.floor(surviveTime)}s`]
];
cx.font=`${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
for(const[label,val]of stats){
cx.fillStyle='rgba(255,240,220,0.4)';cx.textAlign='right';cx.fillText(label,W/2-12,y0);
cx.fillStyle='rgba(255,220,100,0.8)';cx.textAlign='left';cx.fillText(val,W/2+12,y0);
y0+=lh;
}

cx.textAlign='center';
const hasNext=curTrack+1<TRACKS.length&&saveData.tracks[curTrack+1].unlocked;
const pulse=.3+.65*Math.sin(t*2.5);
cx.fillStyle=`rgba(255,240,200,${pulse*.35})`;
cx.font=`${Math.max(11,W*.013)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillText(hasNext?'点击或回车进入下一赛道':'点击或回车返回',W/2,H*.92);
cx.restore();
}

function drawRaceNPCs(){
if(mode!=='tournament'||!raceNPCs.length)return;
const sc=Math.min(W,H)/850,px=W*0.3;
const sorted=[...raceNPCs].sort((a,b)=>b.raceDistance-a.raceDistance);
for(const npc of sorted){
let sx,ds=1,al=1;
const ny=state==='countdown'?lanes[npc.lane]:npc.y;
if(state==='countdown'){
const gridOffset=(npc.lane%2===0)?-20*sc:20*sc;
const vib=countdownTimer<1?3:1.5;
sx=px+gridOffset+(Math.random()-0.5)*vib;
}
else{
const rd=npc.raceDistance-distance;
if(rd>0){const n=Math.min(rd/600,1);ds=Math.max(0.15,1-n*.85);sx=lerp(px+60,W*.92,n);if(n>.95)al=0.3}
else{const n=Math.min(-rd/400,1);
if(n>.7){cx.save();cx.font=`bold ${Math.max(10,W*.013)}px sans-serif`;cx.textAlign='left';cx.fillStyle=npc.color;cx.globalAlpha=.7;cx.fillText('← '+Math.floor(-rd)+'m',8,ny-10*sc);cx.restore();continue}
ds=Math.max(0.3,1-n*.5);sx=lerp(px-60,px-W*.22,n)}}
cx.save();cx.globalAlpha=al;
if(ds!==1){cx.translate(sx,ny);cx.scale(ds,ds);cx.translate(-sx,-ny)}
drawAiCar({x:sx,y:ny,smashed:false,entryAlpha:1,color:npc.color,style:npc.style,w:110*sc,h:44*sc});
cx.restore();
if(state!=='countdown'){const rd=npc.raceDistance-distance;
if(Math.abs(rd)>5){cx.save();const lf=Math.max(9,W*.011)*Math.max(ds,.6);
cx.font=`bold ${lf}px sans-serif`;cx.textAlign='center';
cx.fillStyle=rd>0?'rgba(255,100,60,.85)':'rgba(100,255,100,.85)';
cx.fillText((rd>0?'+':'')+Math.floor(rd)+'m',sx,ny-38*sc*ds);cx.restore()}}
}}

function drawCountdown(){
if(state!=='countdown')return;
cx.fillStyle='rgba(0,0,0,0.3)';cx.fillRect(0,0,W,H);
const sc=Math.min(W,H)/850;
const lineX=W*0.3+150*sc;
const gridSz=12;
const gridTop=roadLaneTop-5;
const gridBot=roadLaneTop+laneWidth*LANE_COUNT+5;
for(let row=0;row<Math.ceil((gridBot-gridTop)/gridSz);row++){
for(let col=0;col<3;col++){
cx.fillStyle=(row+col)%2===0?'rgba(255,255,255,0.65)':'rgba(30,30,30,0.65)';
cx.fillRect(lineX+col*gridSz,gridTop+row*gridSz,gridSz,gridSz)}}
cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(lineX-2,gridTop,2,gridBot-gridTop);
cx.fillStyle='rgba(255,255,255,0.15)';cx.fillRect(lineX+3*gridSz,gridTop,2,gridBot-gridTop);
const vib=countdownTimer<1?4:2;
cx.save();cx.translate((Math.random()-0.5)*vib,(Math.random()-0.5)*vib*0.5);
for(let i=0;i<LANE_COUNT;i++){
const ly=lanes[i];const isPl=i===1;
const exhaust=Math.random()*6+2;
cx.fillStyle=isPl?'rgba(255,180,60,0.3)':'rgba(255,100,40,0.2)';
for(let e=0;e<3;e++){
cx.beginPath();cx.arc(W*0.3-135*sc+(Math.random()-0.5)*5,ly+(Math.random()-0.5)*10,exhaust*(0.5+Math.random()),0,6.2832);cx.fill()}}
cx.restore();
let text,cr,cg,cb,progress;
if(countdownTimer>3){text='3';cr=255;cg=255;cb=255;progress=1-(countdownTimer-3)}
else if(countdownTimer>2){text='2';cr=255;cg=220;cb=68;progress=1-(countdownTimer-2)}
else if(countdownTimer>1){text='1';cr=255;cg=100;cb=34;progress=1-(countdownTimer-1)}
else{text='GO!';cr=68;cg=255;cb=68;progress=1-countdownTimer}
let scale,alpha=1;
if(progress<0.15)scale=lerp(3,1,progress/0.15);
else if(progress<0.8)scale=1+0.08*Math.sin(progress*14);
else{const f=(progress-0.8)/0.2;scale=lerp(1,0.6,f);alpha=lerp(1,0,f)}
if(text==='GO!'){scale*=1.5;
cx.fillStyle=`rgba(${cr},${cg},${cb},${alpha*0.06})`;cx.fillRect(0,0,W,H)}
const fs=Math.max(70,Math.min(W,H)*0.22);
cx.save();cx.textAlign='center';cx.textBaseline='middle';
cx.translate(W/2,H*0.36);cx.scale(scale,scale);
cx.font=`bold ${fs}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.strokeStyle=`rgba(0,0,0,${alpha*0.5})`;cx.lineWidth=fs*0.06;cx.strokeText(text,0,0);
cx.fillStyle=`rgba(${cr},${cg},${cb},${alpha})`;
cx.shadowColor=`rgba(${cr},${cg},${cb},${alpha*0.8})`;cx.shadowBlur=50;
cx.fillText(text,0,0);cx.shadowBlur=0;cx.restore();
const lf=Math.max(14,W*0.02);
cx.save();cx.textAlign='center';
cx.font=`bold ${lf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,200,80,0.6)';
cx.fillText(TRACKS[curTrack].name,W/2,H*0.52);
cx.font=`${lf*0.8}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,240,200,0.35)';
cx.fillText(RACE_DIST+'m',W/2,H*0.56);
const lamps=3;const lampY=H*0.2;const lampGap=40;
for(let i=0;i<lamps;i++){const active=countdownTimer<(3-i);
cx.beginPath();cx.arc(W/2+(i-1)*lampGap,lampY,12,0,6.2832);
cx.fillStyle=active?'rgba(255,30,30,0.9)':'rgba(80,80,80,0.5)';cx.fill();
if(active){cx.fillStyle='rgba(255,30,30,0.15)';cx.beginPath();cx.arc(W/2+(i-1)*lampGap,lampY,25,0,6.2832);cx.fill()}}
if(countdownTimer<1){cx.beginPath();cx.arc(W/2+2*lampGap,lampY,12,0,6.2832);
cx.fillStyle='rgba(30,255,30,0.9)';cx.fill();
cx.fillStyle='rgba(30,255,30,0.15)';cx.beginPath();cx.arc(W/2+2*lampGap,lampY,25,0,6.2832);cx.fill()}
cx.restore();
}

function drawFinishAnim(){
if(!finishTriggered||finishAnimTimer<=0||state!=='play')return;
const prog=1-finishAnimTimer/2.5;
const fs=Math.max(40,Math.min(W,H)*0.1);
cx.save();cx.textAlign='center';cx.textBaseline='middle';
let scale=prog<0.15?lerp(3,1,prog/0.15):1;
let alpha=prog>0.7?lerp(1,0.3,(prog-0.7)/0.3):1;
cx.translate(W/2,H*0.33);cx.scale(scale,scale);cx.globalAlpha=alpha;
cx.font=`bold ${fs}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ffd060';cx.shadowColor='rgba(255,180,50,0.8)';cx.shadowBlur=35;
cx.fillText('冲线！',0,0);cx.shadowBlur=0;
if(prog>0.25){const ra=Math.min(1,(prog-0.25)/0.2);cx.globalAlpha=ra*alpha;
const rf=fs*0.55;cx.font=`bold ${rf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
const pc=racePosition<=1?'#ffd060':racePosition<=2?'#c0c0c0':racePosition<=3?'#cd7f32':'#e05040';
cx.fillStyle=pc;cx.fillText('第'+racePosition+'名',0,fs*0.8)}
cx.restore();
}

// ====== MAIN LOOP ======

let last=0;

function frame(ts){
const dt=Math.min((ts-last)/1000,.04);
last=ts;t+=dt;

let spd;
if(state==='play')spd=baseSpd*speedMul;
else if(state==='countdown')spd=0;
else if(state==='gameover'||state==='levelcomplete'){speedMul*=Math.pow(.08,dt);if(speedMul<.015)speedMul=.015;spd=baseSpd*speedMul}
else spd=200*(1+Math.sin(t*.25)*.04);

let effSpd=spd;
if(state==='play'){
if(speedPenalty>0)effSpd*=0.45;
if(nitroActive)effSpd*=2.5;
}

scroll+=effSpd*dt;
wheelAng-=effSpd*dt*.065;

if(state==='play'){updateGame(dt,spd);updateEngineSound(displaySpd)}
if(state==='countdown'){countdownTimer-=dt;
const cdSec=Math.ceil(countdownTimer);
if(cdSec!==prevCountdownSec&&cdSec>=0&&cdSec<=3){prevCountdownSec=cdSec;playCountdownBeep(cdSec===0)}
if(countdownTimer<=0){state='play';flashA=0.3;flashC='100,255,80';shakeAmt=0.2;updateTouchVis()}}

for(let i=cFx.length-1;i>=0;i--){cFx[i].x+=cFx[i].vx*dt;cFx[i].y+=cFx[i].vy*dt;cFx[i].life-=dt*2.5;if(cFx[i].life<=0)cFx.splice(i,1)}
if(shakeAmt>0){shakeAmt-=dt*1.8;if(shakeAmt<0)shakeAmt=0}
if(flashA>0){flashA-=dt*1.5;if(flashA<0)flashA=0}

cx.save();
if(shakeAmt>0||(state==='play'&&nitroActive)){
const shake=shakeAmt+(nitroActive?.06:0);
cx.translate((Math.random()-.5)*shake*22,(Math.random()-.5)*shake*16);
}
cx.clearRect(-30,-30,W+60,H+60);

if(mode==='freerun'&&(state==='play'||state==='gameover')){
drawFreerunScenery(dt);
}else{
drawSky();cx.save();cx.globalAlpha=0.15;drawStars();cx.restore();drawSun();drawClouds();drawBirds();
drawMountainLayer(scroll*0.06,7.3,'#4a3868',H*0.14,roadY-H*0.18);
drawMountainLayer(scroll*0.12,3.1,'#5a4870',H*0.11,roadY-H*0.10);
drawHaze(roadY-H*0.25,roadY,0.04);
drawHillLayer(scroll*0.22,11.7,'#3a5830',H*0.08,roadY-H*0.05);
drawHillLayer(scroll*0.32,19.3,'#2a4820',H*0.06,roadY-H*0.01);
drawFarTreeLine(scroll*0.38);drawRoadPalms(scroll*0.5);drawPowerPoles(scroll*0.7);
drawRoad();drawRoadMarkings(scroll*1.0);drawGrass(scroll*0.8);drawBushes(scroll*0.85);
}

drawFinishLine();
drawObstacles();drawCoins();drawNitroPickups();drawPowerups();
drawAiCars();drawRaceNPCs();

const carPx=W*.3;
const carPy=state==='menu'||state==='select'?(lanes[1]||pYMin):pY;
const carSc=Math.min(W,H)/850;
updateDust(dt,carPx,carPy,carSc);
drawDust();drawFireTrail(dt);
drawActivePUEffects();
drawCar(carPx,carPy);
drawCFx();drawSmashFx(dt);drawSpeedLines(dt);drawOvertakeFx(dt);
drawVignette();drawNitroScreenFx();
if(mode==='freerun'&&(state==='play'||state==='gameover'))drawFreerunParticles(curEnvIdx);

if(flashA>0){cx.fillStyle=`rgba(${flashC},${flashA})`;cx.fillRect(-30,-30,W+60,H+60)}
cx.restore();

drawFinishAnim();
drawObstacleWarnings();
drawHUD();
if(mode==='freerun'&&(state==='play'||state==='gameover'))drawEnvWelcome();
if(state==='menu')drawMenu();
else if(state==='select')drawTrackSelect();
else if(state==='countdown')drawCountdown();
else if(state==='gameover')drawGameOver();
else if(state==='levelcomplete')drawLevelComplete();

requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
