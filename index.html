<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Golden Hour Drive</title>
<style>
*{margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
let W, H, roadY;

function resize() {
  W = cv.width = innerWidth;
  H = cv.height = innerHeight;
  roadY = H * 0.66;
}
addEventListener('resize', resize);
resize();

// --- Globals ---
let t = 0, scroll = 0, wheelAng = 0;
const BASE_SPEED = 140;

// --- Noise / Terrain ---
function fract(x) { return x - Math.floor(x); }
function hash(n) { return fract(Math.sin(n * 127.1) * 43758.5453); }
function noise(x) {
  const i = Math.floor(x), f = x - i;
  const u = f * f * (3 - 2 * f);
  return hash(i) * (1 - u) + hash(i + 1) * u;
}
function fbm(x, oct, seed) {
  let v = 0, a = 0.5, f = 1;
  for (let i = 0; i < oct; i++) {
    v += noise(x * f + seed) * a;
    f *= 2.03; a *= 0.5;
  }
  return v;
}

// --- Pre-gen elements ---
const stars = Array.from({length: 150}, () => ({
  x: Math.random(), y: Math.random() * 0.28,
  r: Math.random() * 1.2 + 0.4,
  tw: Math.random() * 6.28
}));

const clouds = Array.from({length: 7}, () => ({
  x: Math.random() * 1.4 - 0.2,
  y: 0.08 + Math.random() * 0.22,
  w: 0.06 + Math.random() * 0.12,
  h: 0.008 + Math.random() * 0.015,
  sp: 0.001 + Math.random() * 0.002
}));

const farTrees = Array.from({length: 50}, (_, i) => ({
  pos: i * 70 + Math.random() * 30,
  h: 18 + Math.random() * 22,
  w: 10 + Math.random() * 12,
  type: Math.random() > 0.45 ? 'pine' : 'round'
}));
const FARTREE_SPAN = 50 * 70 + 60;

const bushes = Array.from({length: 40}, (_, i) => ({
  pos: i * 100 + Math.random() * 50,
  h: 5 + Math.random() * 8,
  w: 8 + Math.random() * 14
}));
const BUSH_SPAN = 40 * 100 + 60;

const POLE_SPACING = 380;
const POLE_COUNT = 12;

const dustPs = [];

// --- Drawing functions ---

function drawSky() {
  const g = cx.createLinearGradient(0, 0, 0, roadY);
  g.addColorStop(0, '#080c28');
  g.addColorStop(0.12, '#0f0e35');
  g.addColorStop(0.3, '#311845');
  g.addColorStop(0.5, '#7a2840');
  g.addColorStop(0.65, '#c4502a');
  g.addColorStop(0.78, '#e08830');
  g.addColorStop(0.9, '#f0c248');
  g.addColorStop(1, '#ffe890');
  cx.fillStyle = g;
  cx.fillRect(0, 0, W, roadY + 2);
}

function drawStars() {
  for (const s of stars) {
    const a = 0.25 + 0.25 * Math.sin(t * 1.8 + s.tw);
    cx.fillStyle = `rgba(255,255,240,${a})`;
    cx.beginPath();
    cx.arc(s.x * W, s.y * H, s.r, 0, 6.2832);
    cx.fill();
  }
}

function drawSun() {
  const sx = W * 0.72, sy = roadY + 2;
  const sr = Math.min(W, H) * 0.055;

  // wide glow
  const g1 = cx.createRadialGradient(sx, sy, sr * 0.3, sx, sy, sr * 8);
  g1.addColorStop(0, 'rgba(255,210,90,0.35)');
  g1.addColorStop(0.25, 'rgba(255,160,50,0.12)');
  g1.addColorStop(1, 'rgba(255,100,30,0)');
  cx.fillStyle = g1;
  cx.fillRect(0, 0, W, roadY + 2);

  // disc
  const g2 = cx.createRadialGradient(sx, sy, 0, sx, sy, sr);
  g2.addColorStop(0, '#fffbe8');
  g2.addColorStop(0.6, '#ffd050');
  g2.addColorStop(1, '#ff8828');
  cx.fillStyle = g2;
  cx.beginPath();
  cx.arc(sx, sy, sr, 0, 6.2832);
  cx.fill();

  // rays
  cx.save();
  cx.globalAlpha = 0.06;
  cx.strokeStyle = '#ffd060';
  cx.lineWidth = sr * 0.25;
  for (let i = 0; i < 14; i++) {
    const a = (i / 14) * 6.2832 + t * 0.04;
    const len = sr * (2.5 + Math.sin(t * 0.7 + i * 2.1) * 0.8);
    cx.beginPath();
    cx.moveTo(sx, sy);
    cx.lineTo(sx + Math.cos(a) * len, sy + Math.sin(a) * len);
    cx.stroke();
  }
  cx.restore();
}

function drawClouds() {
  for (const c of clouds) {
    c.x -= c.sp * 0.016;
    if (c.x + c.w < -0.15) c.x = 1.15;
    const px = c.x * W, py = c.y * H;
    const pw = c.w * W, ph = c.h * H;
    cx.fillStyle = 'rgba(160,85,50,0.12)';
    cx.beginPath(); cx.ellipse(px, py, pw, ph, 0, 0, 6.2832); cx.fill();
    cx.beginPath(); cx.ellipse(px - pw * 0.35, py + ph * 0.4, pw * 0.65, ph * 0.7, 0, 0, 6.2832); cx.fill();
    cx.beginPath(); cx.ellipse(px + pw * 0.4, py + ph * 0.25, pw * 0.5, ph * 0.6, 0, 0, 6.2832); cx.fill();
  }
}

function drawMountainLayer(off, seed, color, peakH, baseY) {
  cx.fillStyle = color;
  cx.beginPath();
  cx.moveTo(-2, roadY + 2);
  for (let x = -2; x <= W + 2; x += 4) {
    const h = fbm((x + off) * 0.0008, 5, seed);
    cx.lineTo(x, baseY - h * peakH);
  }
  cx.lineTo(W + 2, roadY + 2);
  cx.closePath();
  cx.fill();
}

function drawHillLayer(off, seed, color, peakH, baseY) {
  cx.fillStyle = color;
  cx.beginPath();
  cx.moveTo(-2, roadY + 2);
  for (let x = -2; x <= W + 2; x += 3) {
    const h = fbm((x + off) * 0.0012, 4, seed);
    cx.lineTo(x, baseY - h * peakH);
  }
  cx.lineTo(W + 2, roadY + 2);
  cx.closePath();
  cx.fill();
}

function drawFarTreeLine(off) {
  const groundY = roadY - 2;
  for (const tr of farTrees) {
    let sx = ((tr.pos - off % FARTREE_SPAN) % FARTREE_SPAN + FARTREE_SPAN) % FARTREE_SPAN - 40;
    if (sx < -50 || sx > W + 50) continue;
    cx.fillStyle = '#0a0f08';
    if (tr.type === 'pine') {
      cx.fillRect(sx - 1.5, groundY - tr.h * 0.25, 3, tr.h * 0.25);
      for (let j = 0; j < 3; j++) {
        const ly = groundY - tr.h * 0.25 - j * tr.h * 0.25;
        const lw = tr.w * (1 - j * 0.25);
        cx.beginPath();
        cx.moveTo(sx, ly - tr.h * 0.3);
        cx.lineTo(sx - lw, ly);
        cx.lineTo(sx + lw, ly);
        cx.closePath();
        cx.fill();
      }
    } else {
      cx.fillRect(sx - 2, groundY - tr.h * 0.35, 4, tr.h * 0.35);
      cx.beginPath();
      cx.arc(sx, groundY - tr.h * 0.55, tr.w, 0, 6.2832);
      cx.fill();
    }
  }
}

function drawPowerPoles(off) {
  const pH = H * 0.17;
  const crossW = 28;
  const baseY = roadY;

  for (let i = -1; i < W / POLE_SPACING + 2; i++) {
    const px = i * POLE_SPACING - (off % POLE_SPACING);
    if (px < -60 || px > W + 60) continue;

    cx.strokeStyle = '#18180f';
    cx.lineWidth = 4;
    cx.beginPath(); cx.moveTo(px, baseY); cx.lineTo(px, baseY - pH); cx.stroke();

    cx.lineWidth = 2.5;
    cx.beginPath(); cx.moveTo(px - crossW, baseY - pH + 6); cx.lineTo(px + crossW, baseY - pH + 6); cx.stroke();
    cx.beginPath(); cx.moveTo(px - crossW * 0.55, baseY - pH + 16); cx.lineTo(px + crossW * 0.55, baseY - pH + 16); cx.stroke();
  }

  // wires
  cx.strokeStyle = 'rgba(25,25,15,0.35)';
  cx.lineWidth = 1;
  for (let i = -1; i < W / POLE_SPACING + 1; i++) {
    const p1 = i * POLE_SPACING - (off % POLE_SPACING);
    const p2 = p1 + POLE_SPACING;
    const wy = baseY - pH + 6;
    for (let w = 0; w < 2; w++) {
      const wOff = w * 10;
      cx.beginPath();
      for (let j = 0; j <= 24; j++) {
        const fr = j / 24;
        const wx = p1 + (p2 - p1) * fr;
        const sag = 4 * (fr - 0.5) * (fr - 0.5);
        const vy = wy + wOff + (1 - sag) * 14;
        j === 0 ? cx.moveTo(wx, vy) : cx.lineTo(wx, vy);
      }
      cx.stroke();
    }
  }
}

function drawRoad() {
  const g = cx.createLinearGradient(0, roadY, 0, H);
  g.addColorStop(0, '#3a3632');
  g.addColorStop(0.08, '#2c2a28');
  g.addColorStop(0.5, '#222020');
  g.addColorStop(1, '#181615');
  cx.fillStyle = g;
  cx.fillRect(0, roadY, W, H - roadY);

  // road shoulder
  cx.fillStyle = '#4a4030';
  cx.fillRect(0, roadY - 1, W, 4);

  // edge line
  cx.strokeStyle = 'rgba(200,190,160,0.5)';
  cx.lineWidth = 2;
  cx.beginPath(); cx.moveTo(0, roadY + 8); cx.lineTo(W, roadY + 8); cx.stroke();

  // warm light on road near horizon
  const rg = cx.createLinearGradient(0, roadY, 0, roadY + (H - roadY) * 0.3);
  rg.addColorStop(0, 'rgba(255,180,80,0.08)');
  rg.addColorStop(1, 'rgba(255,150,50,0)');
  cx.fillStyle = rg;
  cx.fillRect(0, roadY, W, (H - roadY) * 0.3);
}

function drawRoadMarkings(off) {
  const dashLen = 45, gapLen = 65;
  const total = dashLen + gapLen;
  const my = roadY + (H - roadY) * 0.33;
  cx.fillStyle = 'rgba(220,210,170,0.7)';
  for (let i = -1; i < W / total + 2; i++) {
    const dx = i * total - (off % total);
    cx.fillRect(dx, my, dashLen, 3);
  }
}

function drawGrass(off) {
  cx.strokeStyle = '#1a2510';
  cx.lineWidth = 1.2;
  for (let x = 0; x < W; x += 6) {
    const sway = Math.sin((x + off * 0.25) * 0.04 + t * 2.5) * 3;
    const h = 6 + Math.sin(x * 0.27 + 31) * 3;
    cx.beginPath();
    cx.moveTo(x, roadY + 2);
    cx.quadraticCurveTo(x + sway * 0.4, roadY + 2 - h * 0.5, x + sway, roadY + 2 - h);
    cx.stroke();
  }
}

function drawBushes(off) {
  for (const b of bushes) {
    let sx = ((b.pos - off % BUSH_SPAN) % BUSH_SPAN + BUSH_SPAN) % BUSH_SPAN - 30;
    if (sx < -30 || sx > W + 30) continue;
    cx.fillStyle = '#12180a';
    cx.beginPath();
    cx.ellipse(sx, roadY + 1, b.w, b.h, 0, 0, 6.2832);
    cx.fill();
  }
}

// --- Car ---
function drawCar(px, py) {
  const sc = Math.min(W, H) / 850;
  const bounce = Math.sin(t * 4.5) * 1.8 + Math.sin(t * 7.3) * 0.6;
  const tilt = Math.sin(t * 3.8) * 0.002;

  cx.save();
  cx.translate(px, py + bounce);
  cx.rotate(tilt);
  cx.scale(sc, sc);

  // shadow
  cx.fillStyle = 'rgba(0,0,0,0.22)';
  cx.beginPath();
  cx.ellipse(5, 18 - bounce / sc, 128, 9, 0, 0, 6.2832);
  cx.fill();

  // --- body ---
  cx.fillStyle = '#1c3a58';
  cx.beginPath();
  // front bottom → clockwise
  cx.moveTo(128, 6);
  cx.lineTo(132, -2);
  cx.quadraticCurveTo(133, -18, 128, -28);
  cx.lineTo(112, -34);
  // hood
  cx.lineTo(62, -37);
  // A-pillar
  cx.lineTo(38, -72);
  // roof
  cx.quadraticCurveTo(5, -80, -25, -76);
  // C-pillar
  cx.lineTo(-52, -62);
  cx.lineTo(-72, -42);
  // trunk
  cx.lineTo(-88, -37);
  cx.lineTo(-112, -34);
  // rear bumper
  cx.quadraticCurveTo(-133, -18, -132, -2);
  cx.lineTo(-128, 6);
  // bottom with wheel wells
  cx.lineTo(-94, 6);
  cx.arc(-68, 6, 25, 0, Math.PI, true);
  cx.lineTo(-42, 6);
  cx.lineTo(42, 6);
  cx.arc(68, 6, 25, 0, Math.PI, true);
  cx.lineTo(94, 6);
  cx.closePath();
  cx.fill();

  // body top warm highlight
  const hl = cx.createLinearGradient(0, -80, 0, -34);
  hl.addColorStop(0, 'rgba(255,185,85,0.12)');
  hl.addColorStop(1, 'rgba(255,150,60,0.03)');
  cx.fillStyle = hl;
  cx.beginPath();
  cx.moveTo(112, -34);
  cx.lineTo(62, -37);
  cx.lineTo(38, -72);
  cx.quadraticCurveTo(5, -80, -25, -76);
  cx.lineTo(-52, -62);
  cx.lineTo(-72, -42);
  cx.lineTo(-88, -37);
  cx.lineTo(-112, -34);
  cx.closePath();
  cx.fill();

  // body bottom accent line
  cx.strokeStyle = 'rgba(0,0,0,0.15)';
  cx.lineWidth = 1;
  cx.beginPath();
  cx.moveTo(128, -8);
  cx.lineTo(-128, -8);
  cx.stroke();

  // --- windows ---
  const winFill = 'rgba(255,175,80,0.32)';

  // windshield
  cx.fillStyle = winFill;
  cx.beginPath();
  cx.moveTo(59, -39);
  cx.lineTo(40, -70);
  cx.quadraticCurveTo(30, -75, 22, -76);
  cx.lineTo(22, -39);
  cx.closePath();
  cx.fill();

  // front side window
  cx.beginPath();
  cx.moveTo(19, -39);
  cx.lineTo(19, -75);
  cx.quadraticCurveTo(0, -79, -18, -76);
  cx.lineTo(-18, -39);
  cx.closePath();
  cx.fill();

  // rear side window
  cx.beginPath();
  cx.moveTo(-21, -39);
  cx.lineTo(-21, -75);
  cx.quadraticCurveTo(-38, -72, -50, -60);
  cx.lineTo(-60, -48);
  cx.lineTo(-60, -39);
  cx.closePath();
  cx.fill();

  // window sun reflection streak
  cx.fillStyle = 'rgba(255,220,140,0.12)';
  cx.beginPath();
  cx.moveTo(50, -45);
  cx.lineTo(42, -62);
  cx.lineTo(35, -62);
  cx.lineTo(42, -45);
  cx.closePath();
  cx.fill();

  // pillar dividers
  cx.strokeStyle = '#152d48';
  cx.lineWidth = 2.5;
  cx.beginPath(); cx.moveTo(22, -39); cx.lineTo(22, -76); cx.stroke();
  cx.beginPath(); cx.moveTo(-18, -39); cx.lineTo(-18, -76); cx.stroke();

  // door line
  cx.strokeStyle = 'rgba(0,0,0,0.18)';
  cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(-18, -37); cx.lineTo(-18, 4); cx.stroke();

  // door handle
  cx.fillStyle = 'rgba(180,200,220,0.2)';
  cx.fillRect(0, -22, 12, 3);
  cx.fillRect(-40, -22, 12, 3);

  // side mirror
  cx.fillStyle = '#152d48';
  cx.beginPath();
  cx.ellipse(58, -36, 6, 4, -0.3, 0, 6.2832);
  cx.fill();

  // --- headlight ---
  cx.fillStyle = '#fff8e0';
  cx.beginPath();
  cx.ellipse(130, -18, 5, 7, 0.1, 0, 6.2832);
  cx.fill();

  // headlight beam
  const beam = cx.createRadialGradient(135, -16, 2, 170, -12, 90);
  beam.addColorStop(0, 'rgba(255,250,215,0.25)');
  beam.addColorStop(1, 'rgba(255,240,180,0)');
  cx.fillStyle = beam;
  cx.beginPath();
  cx.moveTo(132, -28);
  cx.lineTo(220, -40);
  cx.lineTo(220, 10);
  cx.lineTo(132, -6);
  cx.closePath();
  cx.fill();

  // --- taillight ---
  cx.fillStyle = '#e82020';
  cx.beginPath();
  cx.ellipse(-130, -18, 4, 6, 0, 0, 6.2832);
  cx.fill();
  const tg = cx.createRadialGradient(-132, -18, 2, -155, -18, 45);
  tg.addColorStop(0, 'rgba(255,25,15,0.25)');
  tg.addColorStop(1, 'rgba(200,0,0,0)');
  cx.fillStyle = tg;
  cx.fillRect(-190, -38, 65, 42);

  // --- wheels ---
  drawWheel(68, 6, 23);
  drawWheel(-68, 6, 23);

  cx.restore();
}

function drawWheel(x, y, r) {
  // tire
  cx.fillStyle = '#0c0c0c';
  cx.beginPath(); cx.arc(x, y, r, 0, 6.2832); cx.fill();

  // tire edge highlight
  cx.strokeStyle = 'rgba(60,55,50,0.4)';
  cx.lineWidth = 1.5;
  cx.beginPath(); cx.arc(x, y, r, 0, 6.2832); cx.stroke();

  // rim
  cx.fillStyle = '#4a4a4a';
  cx.beginPath(); cx.arc(x, y, r * 0.62, 0, 6.2832); cx.fill();

  // inner rim
  cx.fillStyle = '#3a3a3a';
  cx.beginPath(); cx.arc(x, y, r * 0.52, 0, 6.2832); cx.fill();

  // spokes
  cx.save();
  cx.translate(x, y);
  cx.rotate(wheelAng);
  cx.strokeStyle = '#6a6a6a';
  cx.lineWidth = 2.2;
  for (let i = 0; i < 5; i++) {
    const a = (i / 5) * 6.2832;
    cx.beginPath();
    cx.moveTo(Math.cos(a) * r * 0.1, Math.sin(a) * r * 0.1);
    cx.lineTo(Math.cos(a) * r * 0.5, Math.sin(a) * r * 0.5);
    cx.stroke();
  }
  cx.restore();

  // hub
  cx.fillStyle = '#7a7a7a';
  cx.beginPath(); cx.arc(x, y, r * 0.1, 0, 6.2832); cx.fill();
}

// --- Dust particles ---
function updateDust(dt, carPx, carPy, sc) {
  if (Math.random() < 0.4) {
    dustPs.push({
      x: carPx - 110 * sc,
      y: carPy + 12 * sc,
      vx: -25 - Math.random() * 40,
      vy: -8 - Math.random() * 15,
      life: 1,
      sz: 1.5 + Math.random() * 3
    });
  }
  for (let i = dustPs.length - 1; i >= 0; i--) {
    const p = dustPs[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 12 * dt;
    p.life -= dt * 0.9;
    if (p.life <= 0 || dustPs.length > 60) dustPs.splice(i, 1);
  }
}

function drawDust() {
  for (const p of dustPs) {
    cx.fillStyle = `rgba(160,140,120,${p.life * 0.18})`;
    cx.beginPath();
    cx.arc(p.x, p.y, p.sz * p.life, 0, 6.2832);
    cx.fill();
  }
}

// --- Birds ---
const birds = Array.from({length: 5}, () => ({
  x: Math.random(), y: 0.08 + Math.random() * 0.15,
  sp: 0.003 + Math.random() * 0.004,
  flap: Math.random() * 6.28
}));

function drawBirds() {
  cx.strokeStyle = 'rgba(30,20,15,0.25)';
  cx.lineWidth = 1.2;
  for (const b of birds) {
    b.x -= b.sp * 0.016;
    if (b.x < -0.05) { b.x = 1.05; b.y = 0.08 + Math.random() * 0.15; }
    const bx = b.x * W, by = b.y * H;
    const wing = Math.sin(t * 6 + b.flap) * 4;
    cx.beginPath();
    cx.moveTo(bx - 6, by + wing);
    cx.quadraticCurveTo(bx, by - Math.abs(wing) * 0.5, bx + 6, by + wing);
    cx.stroke();
  }
}

// --- Haze between layers ---
function drawHaze(y1, y2, alpha) {
  cx.fillStyle = `rgba(200,145,90,${alpha})`;
  cx.fillRect(0, y1, W, y2 - y1);
}

// --- Vignette ---
function drawVignette() {
  const vg = cx.createRadialGradient(W * 0.5, H * 0.45, W * 0.25, W * 0.5, H * 0.5, W * 0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.45)');
  cx.fillStyle = vg;
  cx.fillRect(0, 0, W, H);
}

// --- Main Loop ---
let last = 0;

function frame(ts) {
  const dt = Math.min((ts - last) / 1000, 0.04);
  last = ts;
  t += dt;

  const spd = BASE_SPEED * (1 + Math.sin(t * 0.25) * 0.04);
  scroll += spd * dt;
  wheelAng -= spd * dt * 0.065;

  cx.clearRect(0, 0, W, H);

  // sky
  drawSky();
  drawStars();
  drawSun();
  drawClouds();
  drawBirds();

  // mountains
  drawMountainLayer(scroll * 0.06, 7.3, '#18102e', H * 0.14, roadY - H * 0.18);
  drawMountainLayer(scroll * 0.12, 3.1, '#221540', H * 0.11, roadY - H * 0.10);
  drawHaze(roadY - H * 0.25, roadY, 0.03);

  // hills
  drawHillLayer(scroll * 0.22, 11.7, '#1a2615', H * 0.08, roadY - H * 0.05);
  drawHillLayer(scroll * 0.32, 19.3, '#121e0d', H * 0.06, roadY - H * 0.01);

  // far tree line
  drawFarTreeLine(scroll * 0.38);

  // poles + wires
  drawPowerPoles(scroll * 0.7);

  // road
  drawRoad();
  drawRoadMarkings(scroll * 1.0);
  drawGrass(scroll * 0.8);
  drawBushes(scroll * 0.85);

  // car
  const carPx = W * 0.3;
  const carPy = roadY + H * 0.035;
  const carSc = Math.min(W, H) / 850;
  updateDust(dt, carPx, carPy, carSc);
  drawDust();
  drawCar(carPx, carPy);

  // post
  drawVignette();

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
