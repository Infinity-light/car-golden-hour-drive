<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>落日狂飙</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1510;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;font-family:'Microsoft YaHei','PingFang SC','Segoe UI',system-ui,sans-serif}
canvas{display:block}
#ctrl{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:space-between;align-items:center;padding:8px 16px calc(env(safe-area-inset-bottom,0px) + 10px);z-index:10;pointer-events:none;background:rgba(50,35,20,0.6);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(230,160,60,0.18)}
#ctrl.show{display:flex}
.bg{display:flex;gap:8px;pointer-events:auto}
.bg.left{flex-direction:column;gap:6px}
.cb{width:54px;height:54px;border-radius:14px;border:1.5px solid rgba(230,160,60,0.25);background:rgba(230,160,60,0.05);color:rgba(230,160,60,0.8);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;cursor:pointer;transition:all .12s;box-shadow:0 0 10px rgba(230,160,60,0.06)}
.cb:active,.cb.pressed{background:rgba(230,160,60,0.18);border-color:rgba(230,160,60,0.5);box-shadow:0 0 18px rgba(230,160,60,0.2)}
.cb.nos{border-color:rgba(255,140,0,0.25);color:rgba(255,140,0,0.8);background:rgba(255,140,0,0.05);font-size:12px;font-weight:800}
.cb.nos.ready{border-color:rgba(100,255,60,0.7);color:rgba(100,255,60,1);animation:np .7s infinite}
.cb.nos.active{border-color:rgba(255,140,0,0.8);color:#ff8800;background:rgba(255,100,0,0.18);animation:none}
@keyframes np{0%,100%{box-shadow:0 0 8px rgba(100,255,60,0.25)}50%{box-shadow:0 0 22px rgba(100,255,60,0.45)}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ctrl">
<div class="bg left"><div class="cb" id="btn-up">▲</div><div class="cb" id="btn-down">▼</div></div>
<div class="bg right"><div class="cb nos" id="btn-nos">氮气</div></div>
</div>
<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H,roadY,DPR=1;

const TRACKS=[
{name:'黄金海岸',sub:'温暖的起点',target:2000,stars:[3000,6000,10000],diff:1},
{name:'棕榈大道',sub:'加速前进',target:2500,stars:[4000,8000,14000],diff:1.2},
{name:'山间高速',sub:'蜿蜒挑战',target:3000,stars:[5500,11000,18000],diff:1.4},
{name:'夕阳之路',sub:'终极试炼',target:3500,stars:[7000,14000,22000],diff:1.7}
];

let state='menu',mode='freerun',curTrack=0;
let t=0,scroll=0,wheelAng=0;
let score=0,gameTime=0,speedMul=1,baseSpd=550;
let shakeAmt=0,flashA=0,flashC='255,200,100';
let pY=0,pYMin=0,pYMax=0;
const pMoveSpd=250;
let nitro=0,nitroActive=false,nitroTimer=0;
let gear=1,displaySpd=0;
let distance=0,coinsCollected=0,overtakeCount=0,smashCount=0,maxSpd=0,surviveTime=0;
let obstacles=[],obsTimer=0,coins=[],coinTimer=0;
let nitroPickups=[],nitroPickTimer=0;
let aiCars=[],aiTimer=0;
let cFx=[],overtakeFx=[],smashFx=[];
let speedLines=[],fireTrail=[],dustPs=[];
let menuSel=0,isTouchDevice=false;
const LANE_COUNT=4;
let lanes=[],currentLane=1,laneSwitchCooldown=0,laneWidth=0,roadLaneTop=0;
let raceTotal=6,racePosition=6,prevPosition=6,posChangeFx=0,posChangeDir=0;
let speedPenalty=0;

const ENVS=[
{name:'棕榈树公路',end:2000,welcome:'出发！棕榈树公路'},
{name:'城市高速',end:4000,welcome:'进入城市快速路'},
{name:'乡村田野',end:6000,welcome:'田园牧歌，风光无限'},
{name:'沙漠公路',end:8000,welcome:'穿越炙热沙漠'},
{name:'海岛沿海',end:10000,welcome:'欢迎来到夏威夷海岸'},
{name:'雪山公路',end:12000,welcome:'冰雪世界，注意路滑'},
{name:'樱花隧道',end:14000,welcome:'樱花盛开的季节'},
{name:'虚数空间',end:Infinity,welcome:'欢迎进入虚数空间'}
];
let curEnvIdx=0,envWelcomeTimer=0;
let snowPs=[],petalPs=[],dataPs=[];

const OD={rock:{w:42,h:36},cone:{w:28,h:48},barrier:{w:85,h:40}};
const AI_COLORS=['#c43030','#2a7a40','#3060a0','#8a5020','#6a3080','#a06030','#2080a0','#904050'];

let saveData={bestFreeRun:0,tracks:TRACKS.map((_,i)=>({unlocked:i===0,best:0,stars:0})),showTouch:'auto'};
function loadSave(){try{const d=JSON.parse(localStorage.getItem('sr_save'));if(d&&d.tracks){saveData=d;if(!saveData.showTouch)saveData.showTouch='auto';while(saveData.tracks.length<TRACKS.length)saveData.tracks.push({unlocked:false,best:0,stars:0})}}catch(e){}}
function writeSave(){try{localStorage.setItem('sr_save',JSON.stringify(saveData))}catch(e){}}
loadSave();

function resize(){
DPR=window.devicePixelRatio||1;
W=innerWidth;H=innerHeight;
cv.width=W*DPR;cv.height=H*DPR;
cv.style.width=W+'px';cv.style.height=H+'px';
cx.setTransform(DPR,0,0,DPR,0,0);
roadY=H*0.55;
const roadH=H-roadY;
roadLaneTop=roadY+roadH*0.06;
const usableBot=roadY+roadH*0.80;
laneWidth=(usableBot-roadLaneTop)/LANE_COUNT;
for(let i=0;i<LANE_COUNT;i++)lanes[i]=roadLaneTop+laneWidth*(i+0.5);
pYMin=lanes[0];pYMax=lanes[LANE_COUNT-1];
if(state!=='play'){currentLane=1;pY=lanes[1]||pYMin}
pY=clamp(pY,pYMin,pYMax);
for(const o of obstacles)o.y=clamp(o.y,pYMin-10,pYMax+10);
for(const c of coins)c.y=clamp(c.y,pYMin,pYMax);
for(const n of nitroPickups)n.y=clamp(n.y,pYMin,pYMax);
for(const a of aiCars)a.tgtY=clamp(a.tgtY,pYMin,pYMax);
updateTouchVis();
}
addEventListener('resize',resize);

function updateTouchVis(){
const el=document.getElementById('ctrl');
const show=saveData.showTouch==='on'||(saveData.showTouch==='auto'&&isTouchDevice);
if(state==='play'&&show)el.classList.add('show');else el.classList.remove('show');
const nb=document.getElementById('btn-nos');
nb.classList.toggle('ready',nitro>=100&&!nitroActive);
nb.classList.toggle('active',nitroActive);
}
resize();

function fract(x){return x-Math.floor(x)}
function hash(n){return fract(Math.sin(n*127.1)*43758.5453)}
function noise(x){const i=Math.floor(x),f=x-i,u=f*f*(3-2*f);return hash(i)*(1-u)+hash(i+1)*u}
function fbm(x,oct,seed){let v=0,a=.5,f=1;for(let i=0;i<oct;i++){v+=noise(x*f+seed)*a;f*=2.03;a*=.5}return v}
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,mn,mx){return v<mn?mn:v>mx?mx:v}
function getEnvIdx(d){for(let i=0;i<ENVS.length;i++)if(d<ENVS[i].end)return i;return ENVS.length-1}
function getDayPhase(d){return clamp(d/14000,0,1)}
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function rgbHex(r,g,b){return'#'+[r,g,b].map(v=>clamp(Math.round(v),0,255).toString(16).padStart(2,'0')).join('')}
function lerpHex(a,b,tt){const ca=hexRgb(a),cb=hexRgb(b);return rgbHex(lerp(ca[0],cb[0],tt),lerp(ca[1],cb[1],tt),lerp(ca[2],cb[2],tt))}

const stars=Array.from({length:150},()=>({x:Math.random(),y:Math.random()*0.28,r:Math.random()*1.2+0.4,tw:Math.random()*6.28}));
const clouds=Array.from({length:7},()=>({x:Math.random()*1.4-0.2,y:0.08+Math.random()*0.22,w:0.06+Math.random()*0.12,h:0.008+Math.random()*0.015,sp:0.001+Math.random()*0.002}));
const birds=Array.from({length:5},()=>({x:Math.random(),y:0.08+Math.random()*0.15,sp:0.003+Math.random()*0.004,flap:Math.random()*6.28}));
const farTrees=Array.from({length:30},(_,i)=>({pos:i*85+Math.random()*40,h:18+Math.random()*22,w:10+Math.random()*12,type:Math.random()>.55?'pine':'round'}));
const FARTREE_SPAN=30*85+60;
const roadPalms=Array.from({length:18},(_,i)=>({pos:i*200+Math.random()*80,h:70+Math.random()*60,lean:(Math.random()-0.4)*20,seed:Math.random()*999}));
const PALM_SPAN=18*200+100;
const bushes=Array.from({length:40},(_,i)=>({pos:i*100+Math.random()*50,h:5+Math.random()*8,w:8+Math.random()*14}));
const BUSH_SPAN=40*100+60;
const POLE_SPACING=380;

let keys={},holdUp=false,holdDown=false;
addEventListener('keydown',e=>{
keys[e.code]=true;
if(state==='menu'){
if(e.code==='ArrowUp'||e.code==='KeyW'){menuSel=(menuSel+2)%3}
if(e.code==='ArrowDown'||e.code==='KeyS'){menuSel=(menuSel+1)%3}
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();menuAction(menuSel)}
return}
if(state==='select'){
if(e.code==='ArrowLeft'||e.code==='KeyA')curTrack=Math.max(0,curTrack-1);
if(e.code==='ArrowRight'||e.code==='KeyD')curTrack=Math.min(TRACKS.length-1,curTrack+1);
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();if(saveData.tracks[curTrack].unlocked)startTournament(curTrack)}
if(e.code==='Escape'||e.code==='Backspace')state='menu';
return}
if(state==='gameover'||state==='levelcomplete'){
if(e.code==='Space'||e.code==='Enter'){e.preventDefault();afterEndAction()}
if(e.code==='Escape')state='menu';
return}
if(state==='settings'){
if(e.code==='Escape'||e.code==='Backspace')state='menu';
if(e.code==='ArrowUp'||e.code==='ArrowDown'){
const opts=['auto','on','off'];
saveData.showTouch=opts[(opts.indexOf(saveData.showTouch)+1)%3];
writeSave();updateTouchVis()}
return}
if(state!=='play')return;
if(e.code==='ArrowUp'||e.code==='KeyW'){e.preventDefault();holdUp=true}
if(e.code==='ArrowDown'||e.code==='KeyS'){e.preventDefault();holdDown=true}
if(e.code==='KeyN'||e.code==='KeyF'||e.code==='ShiftLeft'||e.code==='ShiftRight'||e.code==='Space'){e.preventDefault();activateNitro()}
if(e.code==='Escape')state='menu';
});
addEventListener('keyup',e=>{
keys[e.code]=false;
if(e.code==='ArrowUp'||e.code==='KeyW')holdUp=false;
if(e.code==='ArrowDown'||e.code==='KeyS')holdDown=false;
});

let touchBtns={up:false,down:false,nos:false};
function setupTouchBtn(id,key){
const el=document.getElementById(id);
const onD=e=>{e.preventDefault();e.stopPropagation();touchBtns[key]=true;el.classList.add('pressed');
if(state==='play'){if(key==='up')holdUp=true;if(key==='down')holdDown=true;if(key==='nos')activateNitro()}};
const onU=e=>{e.preventDefault();e.stopPropagation();touchBtns[key]=false;el.classList.remove('pressed');
if(key==='up')holdUp=false;if(key==='down')holdDown=false};
el.addEventListener('touchstart',onD,{passive:false});
el.addEventListener('touchend',onU,{passive:false});
el.addEventListener('touchcancel',onU,{passive:false});
el.addEventListener('mousedown',onD);el.addEventListener('mouseup',onU);el.addEventListener('mouseleave',onU);
}
setupTouchBtn('btn-up','up');setupTouchBtn('btn-down','down');
setupTouchBtn('btn-nos','nos');

cv.addEventListener('touchstart',e=>{
e.preventDefault();isTouchDevice=true;updateTouchVis();
},{passive:false});
cv.addEventListener('touchend',e=>{
e.preventDefault();
if(state==='menu'){menuAction(menuSel);return}
if(state==='select'){
const tx=e.changedTouches[0].clientX;
if(tx<W*.3)curTrack=Math.max(0,curTrack-1);
else if(tx>W*.7)curTrack=Math.min(TRACKS.length-1,curTrack+1);
else if(saveData.tracks[curTrack].unlocked)startTournament(curTrack);
return}
if(state==='gameover'||state==='levelcomplete'){afterEndAction();return}
if(state==='settings'){
const opts=['auto','on','off'];
saveData.showTouch=opts[(opts.indexOf(saveData.showTouch)+1)%3];
writeSave();updateTouchVis();return}
},{passive:false});
cv.addEventListener('touchmove',e=>e.preventDefault(),{passive:false});

cv.addEventListener('click',e=>{
if(state==='menu'){
const my=e.clientY/H;
if(my>.36&&my<.52)menuAction(0);
else if(my>.52&&my<.66)menuAction(1);
else if(my>.66&&my<.80)menuAction(2);
}else if(state==='select'){
const mx=e.clientX;
if(mx<W*.3)curTrack=Math.max(0,curTrack-1);
else if(mx>W*.7)curTrack=Math.min(TRACKS.length-1,curTrack+1);
else if(saveData.tracks[curTrack].unlocked)startTournament(curTrack);
}else if(state==='gameover'||state==='levelcomplete')afterEndAction();
else if(state==='settings'){
const opts=['auto','on','off'];
saveData.showTouch=opts[(opts.indexOf(saveData.showTouch)+1)%3];
writeSave();updateTouchVis()}
});

function menuAction(idx){
if(idx===0){mode='freerun';curTrack=0;startGame()}
else if(idx===1)state='select';
else if(idx===2)state='settings';
}
function afterEndAction(){
if(mode==='tournament'&&state==='levelcomplete'){
const next=curTrack+1;
if(next<TRACKS.length&&saveData.tracks[next].unlocked){curTrack=next;startTournament(curTrack)}
else state='select';
}else if(mode==='tournament')state='select';
else state='menu';
}

function startGame(){
state='play';score=0;gameTime=0;speedMul=1;distance=0;
coinsCollected=0;overtakeCount=0;smashCount=0;maxSpd=0;surviveTime=0;
currentLane=1;pY=lanes[1]||pYMin;holdUp=false;holdDown=false;laneSwitchCooldown=0;
obstacles=[];coins=[];cFx=[];nitroPickups=[];smashFx=[];
nitro=30;nitroActive=false;nitroTimer=0;speedPenalty=0;
gear=1;displaySpd=0;
aiCars=[];aiTimer=0;obsTimer=0;coinTimer=0;nitroPickTimer=0;
overtakeFx=[];speedLines=[];fireTrail=[];
shakeAmt=0;flashA=0;
curEnvIdx=0;envWelcomeTimer=2.5;snowPs=[];petalPs=[];dataPs=[];
racePosition=raceTotal;prevPosition=raceTotal;posChangeFx=0;
updateTouchVis();
}
function startTournament(idx){curTrack=idx;mode='tournament';startGame()}

function activateNitro(){
if(nitro>=100&&!nitroActive){
nitroActive=true;nitroTimer=3.5;
shakeAmt=Math.max(shakeAmt,.3);flashA=.15;flashC='255,180,60';
}}

function endGame(){
state='gameover';
if(mode==='freerun'&&score>saveData.bestFreeRun){saveData.bestFreeRun=Math.floor(score);writeSave()}
shakeAmt=.6;flashA=.5;flashC='255,50,30';
document.getElementById('ctrl').classList.remove('show');
}

function completeLevel(){
state='levelcomplete';
const td=saveData.tracks[curTrack],sc=Math.floor(score);
let earned=0;const th=TRACKS[curTrack].stars;
if(sc>=th[0])earned=1;if(sc>=th[1])earned=2;if(sc>=th[2])earned=3;
if(earned>td.stars)td.stars=earned;
if(sc>td.best)td.best=sc;
td.unlocked=true;
if(curTrack+1<TRACKS.length)saveData.tracks[curTrack+1].unlocked=true;
writeSave();shakeAmt=0;flashA=.3;flashC='255,220,100';
document.getElementById('ctrl').classList.remove('show');
}

function spawnObs(){
const sc=Math.min(W,H)/850;
const diff=TRACKS[curTrack].diff||1;
const types=['rock','cone','barrier'];
const tp=types[Math.floor(Math.random()*types.length)],d=OD[tp];
const lane=Math.floor(Math.random()*LANE_COUNT);
const y=lanes[lane];
obstacles.push({x:W+80,y,type:tp,w:d.w*sc,h:d.h*sc,nearMissed:false});
if(gameTime>20&&Math.random()<Math.min(.22,(gameTime-20)*.003*diff)){
let lane2=lane;while(lane2===lane)lane2=Math.floor(Math.random()*LANE_COUNT);
obstacles.push({x:W+80+Math.random()*60,y:lanes[lane2],type:tp,w:d.w*sc,h:d.h*sc,nearMissed:false});
}}

function spawnCoin(){
const sc=Math.min(W,H)/850;
const lane=Math.floor(Math.random()*LANE_COUNT);
const y=lanes[lane];
coins.push({x:W+60,y,r:11*sc});
if(Math.random()<.35){for(let i=1;i<4;i++)coins.push({x:W+60+i*38*sc,y,r:11*sc})}
}

function spawnNitroPickup(){
const sc=Math.min(W,H)/850;
const lane=Math.floor(Math.random()*LANE_COUNT);
const y=lanes[lane];
nitroPickups.push({x:W+60,y,r:14*sc,pulse:Math.random()*6.28});
}

function spawnAiCar(){
const sc=Math.min(W,H)/850;
const lane=Math.floor(Math.random()*LANE_COUNT);
const y=lanes[lane];
const col=AI_COLORS[Math.floor(Math.random()*AI_COLORS.length)];
const fromBehind=Math.random()<0.15;
const baseSR=fromBehind?(1.15+Math.random()*.3):(.45+Math.random()*.4);
const style=Math.floor(Math.random()*3);
aiCars.push({
x:fromBehind?-450:(W+400+Math.random()*400),
y,tgtY:y,lane,color:col,spdRatio:baseSR,baseSpdRatio:baseSR,
overtaken:false,fromBehind,passed:false,smashed:false,style,
yTimer:2+Math.random()*3,spdTimer:2+Math.random()*2,
laneSwitchTimer:3+Math.random()*4,
w:110*sc,h:44*sc,smashVx:0,smashVy:0,smashRot:0,smashRotSpd:0,smashLife:1,
entryAlpha:0
});
}

function spawnCFx(x,y){
for(let i=0;i<12;i++){
const a=(i/12)*6.2832;
cFx.push({x,y,vx:Math.cos(a)*140+(Math.random()-.5)*70,vy:Math.sin(a)*140+(Math.random()-.5)*70,life:1,sz:2+Math.random()*3.5});
}}

function spawnSmashFx(x,y,type){
const colors={rock:['#6a5a48','#8a7a60','#4a3a2a'],cone:['#cc4400','#ffaa00','#ff6600'],barrier:['#aa2215','#ffdd00','#555']};
const cols=colors[type]||['#888'];
for(let i=0;i<15;i++){
const a=Math.random()*6.2832;
const spd=120+Math.random()*250;
smashFx.push({x,y,vx:Math.cos(a)*spd+80,vy:Math.sin(a)*spd-100,life:1,sz:2+Math.random()*6,
color:cols[Math.floor(Math.random()*cols.length)]});
}
smashFx.push({x,y,vx:0,vy:0,life:1,sz:0,color:'#fff',isRing:true,ringR:5});
}

function spawnOvertakeFx(x,y,text,pts){
overtakeFx.push({x:W*.5,y:H*.35,life:1.2,text:text||'超车！',score:pts||200,big:true});
if(pts)overtakeFx.push({x:x+20,y:y-25,life:1,text:`+${pts}`,score:0,big:false});
}

function updateGame(dt,spd){
const diff=TRACKS[curTrack].diff||1;
gameTime+=dt;surviveTime+=dt;
speedMul=1+gameTime*.008*diff;
if(speedMul>3.8)speedMul=3.8;

let effSpd=spd;
if(speedPenalty>0){speedPenalty-=dt;effSpd*=0.45}
if(nitroActive){
nitroTimer-=dt;effSpd*=2.5;nitro-=dt*30;
if(nitroTimer<=0||nitro<=0){nitroActive=false;nitroTimer=0;nitro=Math.max(0,nitro)}
for(let i=0;i<5;i++){
fireTrail.push({x:W*.3-120*(Math.min(W,H)/850),y:pY+(Math.random()-.5)*18,
vx:-280-Math.random()*200,vy:(Math.random()-.5)*80,life:1,sz:4+Math.random()*7,
hue:Math.random()<.5?30:50});
}
if(Math.random()<.6)speedLines.push({x:W+10,y:Math.random()*H,len:80+Math.random()*180,life:1,sp:1000+Math.random()*600});
}else if(speedMul>1.8&&Math.random()<speedMul*0.04){
speedLines.push({x:W+10,y:Math.random()*H,len:30+Math.random()*60,life:1,sp:500+Math.random()*300});
}

const curSpd=effSpd*.3;
if(curSpd>displaySpd)displaySpd+=(curSpd-displaySpd)*Math.min(1,4*dt);
else displaySpd+=(curSpd-displaySpd)*Math.min(1,8*dt);
if(displaySpd>maxSpd)maxSpd=displaySpd;
gear=displaySpd<120?1:displaySpd<200?2:displaySpd<300?3:displaySpd<420?4:displaySpd<560?5:6;

score+=dt*100*speedMul*(nitroActive?1.5:1);
distance+=effSpd*dt*.1;
if(mode==='freerun'){const ni=getEnvIdx(distance);if(ni!==curEnvIdx){curEnvIdx=ni;envWelcomeTimer=3;snowPs=[];petalPs=[];dataPs=[]}}
if(envWelcomeTimer>0)envWelcomeTimer-=dt;
if(mode==='tournament'&&distance>=TRACKS[curTrack].target){completeLevel();return}

if(laneSwitchCooldown>0)laneSwitchCooldown-=dt;
if(holdUp&&laneSwitchCooldown<=0&&currentLane>0){currentLane--;laneSwitchCooldown=0.16}
if(holdDown&&laneSwitchCooldown<=0&&currentLane<LANE_COUNT-1){currentLane++;laneSwitchCooldown=0.16}
const targetLaneY=lanes[currentLane];
pY+=(targetLaneY-pY)*Math.min(1,16*dt);

obsTimer+=dt;
const oi=Math.max(.45,1.6-gameTime*.01*diff);
if(obsTimer>=oi){obsTimer=0;spawnObs()}

coinTimer+=dt;
if(coinTimer>=.9+Math.random()*.6){coinTimer=0;spawnCoin()}

nitroPickTimer+=dt;
if(nitroPickTimer>=4+Math.random()*3){nitroPickTimer=0;spawnNitroPickup()}

aiTimer+=dt;
const aiInterval=Math.max(1.8,4-gameTime*.02);
if(aiTimer>=aiInterval&&aiCars.length<6){aiTimer=0;spawnAiCar()}

for(let i=obstacles.length-1;i>=0;i--){obstacles[i].x-=effSpd*dt;if(obstacles[i].x<-200)obstacles.splice(i,1)}
for(let i=coins.length-1;i>=0;i--){coins[i].x-=effSpd*dt;if(coins[i].x<-60)coins.splice(i,1)}
for(let i=nitroPickups.length-1;i>=0;i--){nitroPickups[i].x-=effSpd*dt;if(nitroPickups[i].x<-60)nitroPickups.splice(i,1)}

const carX=W*.3;
for(let i=aiCars.length-1;i>=0;i--){
const a=aiCars[i];
if(a.smashed){
a.x+=a.smashVx*dt;a.y+=a.smashVy*dt;a.smashVy+=400*dt;
a.smashRot+=a.smashRotSpd*dt;a.smashLife-=dt*1.5;
if(a.smashLife<=0||a.y>H+200){aiCars.splice(i,1)}
continue}
if(a.fromBehind)a.x+=(effSpd*a.spdRatio-effSpd)*dt+effSpd*dt*0.3;
else a.x-=(effSpd-effSpd*a.spdRatio)*dt;
a.y+=(a.tgtY-a.y)*Math.min(1,8*dt);
if(a.entryAlpha!==undefined&&a.entryAlpha<1)a.entryAlpha=Math.min(1,a.entryAlpha+dt*2.5);
a.yTimer-=dt;
if(a.laneSwitchTimer!==undefined){a.laneSwitchTimer-=dt;
if(a.laneSwitchTimer<=0){a.laneSwitchTimer=2+Math.random()*4;
const dir=Math.random()<0.5?-1:1;a.lane=clamp((a.lane||0)+dir,0,LANE_COUNT-1);a.tgtY=lanes[a.lane]}}
else if(a.yTimer<=0){a.yTimer=2+Math.random()*3;a.tgtY=lanes[Math.floor(Math.random()*LANE_COUNT)]}
a.spdTimer-=dt;
if(a.spdTimer<=0){a.spdTimer=1.5+Math.random()*2;a.spdRatio=a.baseSpdRatio+(Math.random()-.5)*.2}
if(a.x<-500||a.x>W+900){aiCars.splice(i,1);continue}
if(!a.smashed&&a.fromBehind&&a.lane===currentLane&&a.x>carX-200&&a.x<carX-50&&(a.laneSwitchTimer||0)>1){
a.lane=a.lane>0?a.lane-1:a.lane+1;a.tgtY=lanes[a.lane];a.laneSwitchTimer=3+Math.random()*3}
if(!a.fromBehind&&!a.overtaken&&a.x<carX+30){
a.overtaken=true;overtakeCount++;score+=200;
racePosition=Math.max(1,racePosition-1);
if(racePosition<prevPosition){posChangeFx=1.5;posChangeDir=-1}
prevPosition=racePosition;
spawnOvertakeFx(a.x,a.y,'超车！',200);
shakeAmt=Math.max(shakeAmt,.15);
}
if(a.fromBehind&&!a.passed&&a.x>carX+80){
a.passed=true;
racePosition=Math.min(raceTotal,racePosition+1);
if(racePosition>prevPosition){posChangeFx=1.5;posChangeDir=1}
prevPosition=racePosition;
spawnOvertakeFx(a.x,a.y,'被超越',0);
}}
if(posChangeFx>0)posChangeFx-=dt;

const sc=Math.min(W,H)/850;
const carCY=pY-25*sc;
const chw=65*sc,chh=20*sc;

for(let i=obstacles.length-1;i>=0;i--){
const o=obstacles[i];
const oCY=o.y-o.h*.5;
if(Math.abs(carX-o.x)<chw+o.w*.38&&Math.abs(carCY-oCY)<chh+o.h*.38){
if(nitroActive){
spawnSmashFx(o.x,oCY,o.type);
obstacles.splice(i,1);
score+=300;smashCount++;
shakeAmt=Math.max(shakeAmt,.25);flashA=.12;flashC='255,200,80';
overtakeFx.push({x:o.x,y:oCY-20,life:1,text:'粉碎！+300',score:0,big:false});
continue;
}
if(mode==='freerun'){endGame();return}
speedPenalty=1.5;shakeAmt=Math.max(shakeAmt,.35);flashA=.2;flashC='255,80,30';
obstacles.splice(i,1);
overtakeFx.push({x:carX,y:carCY-20,life:1,text:'减速！',score:0,big:false});
continue;
}
if(!o.nearMissed){
const dist=Math.sqrt((carX-o.x)**2+(carCY-oCY)**2);
const hitDist=chw+o.w*.38;
if(dist<hitDist*1.6&&dist>=hitDist){
o.nearMissed=true;score+=50;
overtakeFx.push({x:o.x,y:o.y-40*sc,life:1,text:'惊险！+50',score:0,big:false});
}}}

for(let i=coins.length-1;i>=0;i--){
const c=coins[i],ccY=c.y-12*sc;
if(Math.abs(carX-c.x)<chw+c.r*1.5&&Math.abs(carCY-ccY)<chh+c.r*1.5){
score+=100;coinsCollected++;nitro=Math.min(100,nitro+5);
spawnCFx(c.x,ccY);coins.splice(i,1);
}}

for(let i=nitroPickups.length-1;i>=0;i--){
const n=nitroPickups[i],ny=n.y-12*sc;
if(Math.abs(carX-n.x)<chw+n.r*1.8&&Math.abs(carCY-ny)<chh+n.r*1.8){
nitro=Math.min(100,nitro+30);flashA=.1;flashC='80,200,60';shakeAmt=Math.max(shakeAmt,.1);
for(let j=0;j<15;j++){const a2=(j/15)*6.2832;cFx.push({x:n.x,y:ny,vx:Math.cos(a2)*160,vy:Math.sin(a2)*160,life:1,sz:3+Math.random()*4})}
nitroPickups.splice(i,1);
}}

for(const a of aiCars){
if(a.smashed)continue;
if(Math.abs(carX-a.x)<chw+a.w*.35&&Math.abs(carCY-(a.y-a.h*.3))<chh+a.h*.35){
if(nitroActive){
a.smashed=true;
a.smashVx=(a.x>carX?1:-1)*300+100;
a.smashVy=-250-Math.random()*100;
a.smashRotSpd=(Math.random()-.5)*10;
score+=500;smashCount++;
racePosition=Math.max(1,racePosition-1);
if(racePosition<prevPosition){posChangeFx=1.5;posChangeDir=-1}
prevPosition=racePosition;
spawnSmashFx(a.x,a.y,null);
shakeAmt=Math.max(shakeAmt,.4);flashA=.2;flashC='255,200,80';
overtakeFx.push({x:W*.5,y:H*.35,life:1.2,text:'撞飞！+500',score:500,big:true});
continue;
}
if(mode==='freerun'){endGame();return}
speedPenalty=1.5;shakeAmt=.3;flashA=.2;flashC='255,80,30';
overtakeFx.push({x:carX,y:carCY-20,life:1,text:'减速！',score:0,big:false});
}}

updateTouchVis();
}

g.addColorStop(0.25,'#8090b8');

g.addColorStop(0.55,'#d89838');
g.addColorStop(0.68,'#e8a828');

}

function drawStars(){
for(const s of stars){
const a=0.06+0.06*Math.sin(t*1.8+s.tw);

function drawSun(){
const sx=W*0.72,sy=roadY+2;
const sr=Math.min(W,H)*0.055;
const g1=cx.createRadialGradient(sx,sy,sr*0.3,sx,sy,sr*8);
g1.addColorStop(0,'rgba(255,220,100,0.45)');
g1.addColorStop(0.25,'rgba(255,180,70,0.18)');
g1.addColorStop(1,'rgba(255,120,50,0)');
cx.fillStyle=g1;cx.fillRect(0,0,W,roadY+2);
const g2=cx.createRadialGradient(sx,sy,0,sx,sy,sr);
g2.addColorStop(0,'#fffbe8');g2.addColorStop(0.6,'#ffd050');g2.addColorStop(1,'#ff8828');
cx.fillStyle=g2;cx.beginPath();cx.arc(sx,sy,sr,0,6.2832);cx.fill();
cx.save();cx.globalAlpha=0.06;cx.strokeStyle='#ffd060';cx.lineWidth=sr*0.25;
for(let i=0;i<14;i++){
const a=(i/14)*6.2832+t*0.04;
const len=sr*(2.5+Math.sin(t*0.7+i*2.1)*0.8);
cx.beginPath();cx.moveTo(sx,sy);cx.lineTo(sx+Math.cos(a)*len,sy+Math.sin(a)*len);cx.stroke();

function drawClouds(){
for(const c of clouds){
c.x-=c.sp*0.016;if(c.x+c.w<-0.15)c.x=1.15;
const px=c.x*W,py=c.y*H,pw=c.w*W,ph=c.h*H;
cx.fillStyle='rgba(220,160,110,0.18)';
cx.beginPath();cx.ellipse(px,py,pw,ph,0,0,6.2832);cx.fill();
cx.beginPath();cx.ellipse(px-pw*.35,py+ph*.4,pw*.65,ph*.7,0,0,6.2832);cx.fill();
cx.beginPath();cx.ellipse(px+pw*.4,py+ph*.25,pw*.5,ph*.6,0,0,6.2832);cx.fill();
}}

function drawBirds(){
cx.strokeStyle='rgba(60,40,25,0.35)';cx.lineWidth=1.2;
for(const b of birds){
b.x-=b.sp*0.016;if(b.x<-0.05){b.x=1.05;b.y=0.08+Math.random()*0.15}
const bx=b.x*W,by=b.y*H;
const wing=Math.sin(t*6+b.flap)*4;
cx.beginPath();cx.moveTo(bx-6,by+wing);
cx.quadraticCurveTo(bx,by-Math.abs(wing)*0.5,bx+6,by+wing);cx.stroke();

function drawMountainLayer(off,seed,color,peakH,baseY){
cx.fillStyle=color;cx.beginPath();cx.moveTo(-2,roadY+2);
for(let x=-2;x<=W+2;x+=4){const h=fbm((x+off)*0.0008,5,seed);cx.lineTo(x,baseY-h*peakH)}
cx.lineTo(W+2,roadY+2);cx.closePath();cx.fill();
}

function drawHillLayer(off,seed,color,peakH,baseY){
cx.fillStyle=color;cx.beginPath();cx.moveTo(-2,roadY+2);
for(let x=-2;x<=W+2;x+=3){const h=fbm((x+off)*0.0012,4,seed);cx.lineTo(x,baseY-h*peakH)}
cx.lineTo(W+2,roadY+2);cx.closePath();cx.fill();
}

function drawHaze(y1,y2,alpha){
cx.fillStyle=`rgba(230,185,130,${alpha})`;cx.fillRect(0,y1,W,y2-y1);
}

function drawFarTreeLine(off){
const groundY=roadY-2;
for(const tr of farTrees){
let sx=((tr.pos-off%FARTREE_SPAN)%FARTREE_SPAN+FARTREE_SPAN)%FARTREE_SPAN-40;
if(sx<-50||sx>W+50)continue;
cx.fillStyle='#1a2a18';
if(tr.type==='pine'){
cx.fillRect(sx-1.5,groundY-tr.h*.25,3,tr.h*.25);
for(let j=0;j<3;j++){
const ly=groundY-tr.h*.25-j*tr.h*.25;const lw=tr.w*(1-j*.25);
cx.beginPath();cx.moveTo(sx,ly-tr.h*.3);cx.lineTo(sx-lw,ly);cx.lineTo(sx+lw,ly);cx.closePath();cx.fill();
}}else{
cx.fillRect(sx-2,groundY-tr.h*.35,4,tr.h*.35);
cx.beginPath();cx.arc(sx,groundY-tr.h*.55,tr.w,0,6.2832);cx.fill();
}}}

function drawRoadPalms(off){
const groundY=roadY-2;
for(const p of roadPalms){
let sx=((p.pos-off%PALM_SPAN)%PALM_SPAN+PALM_SPAN)%PALM_SPAN-50;
if(sx<-80||sx>W+80)continue;
const h=p.h,lean=p.lean,seed=p.seed;
const topX=sx+lean,topY=groundY-h;
cx.fillStyle='#1a2818';
cx.beginPath();
const bw=4,tw=2.5;
cx.moveTo(sx-bw,groundY);
cx.bezierCurveTo(sx+lean*.25-bw*.6,groundY-h*.4,sx+lean*.6-tw,groundY-h*.8,topX-tw,topY+5);
cx.lineTo(topX+tw,topY+5);
cx.bezierCurveTo(sx+lean*.6+tw,groundY-h*.8,sx+lean*.25+bw*.6,groundY-h*.4,sx+bw,groundY);
cx.closePath();cx.fill();
cx.strokeStyle='rgba(20,30,15,0.25)';cx.lineWidth=0.8;
for(let s=0;s<6;s++){
const st=(s+1)/7,segX=sx+lean*st*st,segY=groundY-h*st;
cx.beginPath();cx.moveTo(segX-3,segY);cx.lineTo(segX+3,segY);cx.stroke();
}
const nf=7;
cx.fillStyle='#1a2818';
for(let i=0;i<nf;i++){
const baseAngle=-Math.PI*.8+(i/(nf-1))*Math.PI*2.1;
const frondLen=h*(0.3+hash(seed+i)*0.1);
const sway=Math.sin(t*1.2+seed*3+i*1.1)*5;
cx.beginPath();cx.moveTo(topX,topY);
const cpx1=topX+Math.cos(baseAngle)*frondLen*.4+sway*.5;
const cpy1=topY+Math.sin(baseAngle)*frondLen*.3-frondLen*.12;
const endX=topX+Math.cos(baseAngle)*frondLen+sway;
const endY=topY+Math.sin(baseAngle)*frondLen*.4+frondLen*.2;
cx.quadraticCurveTo(cpx1,cpy1-3,endX,endY);
cx.quadraticCurveTo(cpx1+2,cpy1+3,topX+1,topY+2);
cx.closePath();cx.fill();
}
for(let i=0;i<3;i++){
cx.beginPath();cx.arc(topX+(i-1)*3,topY+5+i*1.2,2.2,0,6.2832);cx.fill();
}}}

function drawPowerPoles(off){
const pH=H*0.17,crossW=28,baseY=roadY;
for(let i=-1;i<W/POLE_SPACING+2;i++){
const px=i*POLE_SPACING-(off%POLE_SPACING);
if(px<-60||px>W+60)continue;
cx.strokeStyle='#18180f';cx.lineWidth=4;
cx.beginPath();cx.moveTo(px,baseY);cx.lineTo(px,baseY-pH);cx.stroke();
cx.lineWidth=2.5;
cx.beginPath();cx.moveTo(px-crossW,baseY-pH+6);cx.lineTo(px+crossW,baseY-pH+6);cx.stroke();
cx.beginPath();cx.moveTo(px-crossW*.55,baseY-pH+16);cx.lineTo(px+crossW*.55,baseY-pH+16);cx.stroke();
}
cx.strokeStyle='rgba(25,25,15,0.35)';cx.lineWidth=1;
for(let i=-1;i<W/POLE_SPACING+1;i++){
const p1=i*POLE_SPACING-(off%POLE_SPACING),p2=p1+POLE_SPACING,wy=baseY-pH+6;
for(let w=0;w<2;w++){const wOff=w*10;cx.beginPath();
for(let j=0;j<=24;j++){const fr=j/24,wx=p1+(p2-p1)*fr,sag=4*(fr-.5)*(fr-.5),vy=wy+wOff+(1-sag)*14;
j===0?cx.moveTo(wx,vy):cx.lineTo(wx,vy)}cx.stroke()}}
}

function drawRoad(){

g.addColorStop(0,'#585450');g.addColorStop(0.08,'#4a4845');
g.addColorStop(0.5,'#3a3835');g.addColorStop(1,'#302e2b');

function drawDayMoon(){

function drawEnvPalm(off){
drawMountainLayer(off*0.06,7.3,'#4a3868',H*0.14,roadY-H*0.18);
drawMountainLayer(off*0.12,3.1,'#5a4870',H*0.11,roadY-H*0.10);

drawHillLayer(off*0.22,11.7,'#3a5830',H*0.08,roadY-H*0.05);
drawHillLayer(off*0.32,19.3,'#2a4820',H*0.06,roadY-H*0.01);
drawFarTreeLine(off*0.38);drawRoadPalms(off*0.5);drawPowerPoles(off*0.7);
drawGrass(off*0.8);drawBushes(off*0.85);
}

function drawEnvCity(off,dp){
const nightA=clamp((dp-0.5)/0.4,0,1);
const FB_SPAN=20*180+80;const fbOff=(off*0.08)%FB_SPAN;
for(let i=0;i<20;i++){
const pos=i*180+hash(i+50)*80;
let bx=((pos-fbOff)%FB_SPAN+FB_SPAN)%FB_SPAN-100;
if(bx<-120||bx>W+120)continue;
const bh=40+hash(i+10)*100,bw=35+hash(i+20)*25;
cx.fillStyle=nightA>0.3?'#0a1018':'#2a3040';

function updateFreerunParticles(dt,envIdx){
if(envIdx===5){
if(snowPs.length<100&&Math.random()<0.5)snowPs.push({x:Math.random()*W,y:-5,vx:(Math.random()-0.5)*30,vy:40+Math.random()*60,sz:1+Math.random()*3});
for(let i=snowPs.length-1;i>=0;i--){const s=snowPs[i];s.x+=s.vx*dt;s.y+=s.vy*dt;if(s.y>H||s.x<-10||s.x>W+10)snowPs.splice(i,1)}}
if(envIdx===6){
if(petalPs.length<80&&Math.random()<0.4)petalPs.push({x:Math.random()*W+100,y:-5,vx:-20-Math.random()*40,vy:30+Math.random()*50,rot:Math.random()*6.28,rotSpd:1+Math.random()*3,sz:2+Math.random()*4});
for(let i=petalPs.length-1;i>=0;i--){const p=petalPs[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.rot+=p.rotSpd*dt;p.vx+=Math.sin(t+i)*5*dt;if(p.y>H||p.x<-20)petalPs.splice(i,1)}}
if(envIdx===7){
if(dataPs.length<60&&Math.random()<0.3)dataPs.push({x:W+10,y:roadY*0.1+Math.random()*roadY*0.8,vx:-200-Math.random()*300,sz:1+Math.random()*2,hue:(Math.random()*360|0)});
for(let i=dataPs.length-1;i>=0;i--){const d=dataPs[i];d.x+=d.vx*dt;if(d.x<-10)dataPs.splice(i,1)}}
}

function drawFreerunParticles(envIdx){
if(envIdx===5){cx.fillStyle='rgba(240,240,255,0.7)';for(const s of snowPs){cx.beginPath();cx.arc(s.x,s.y,s.sz,0,6.2832);cx.fill()}}
if(envIdx===6){for(const p of petalPs){cx.save();cx.translate(p.x,p.y);cx.rotate(p.rot);
cx.fillStyle='rgba(255,180,200,0.7)';cx.beginPath();cx.ellipse(0,0,p.sz,p.sz*0.5,0,0,6.2832);cx.fill();cx.restore()}}
if(envIdx===7){for(const d of dataPs){cx.fillStyle=`hsla(${d.hue},80%,60%,0.6)`;cx.fillRect(d.x,d.y,8,d.sz)}}
}

function drawFreerunScenery(dt){
const dp=getDayPhase(distance);
const envIdx=curEnvIdx;
const off=scroll;
drawDaySky(dp);
if(dp>0.65){cx.save();cx.globalAlpha=clamp((dp-0.65)/0.25,0,1);drawStars();cx.restore()}
if(dp<0.88)drawDaySun(dp);else drawDayMoon();
if(dp<0.85){cx.save();cx.globalAlpha=clamp(1-dp*0.9,0.1,1);drawClouds();cx.restore()}
if(dp<0.6)drawBirds();
switch(envIdx){
case 0:drawEnvPalm(off);break;case 1:drawEnvCity(off,dp);break;
case 2:drawEnvCountry(off);break;case 3:drawEnvDesert(off);break;
case 4:drawEnvCoast(off);break;case 5:drawEnvSnow(off);break;
case 6:drawEnvCherry(off);break;case 7:drawEnvVirtual(off);break;}
drawFreerunRoad(envIdx);
if(envIdx===7){const dashLen=45,gapLen=65,total=dashLen+gapLen;
cx.fillStyle='rgba(0,200,255,0.35)';
for(let li=1;li<LANE_COUNT;li++){const ly=roadLaneTop+laneWidth*li;
for(let j=-1;j<W/total+2;j++)cx.fillRect(j*total-(off%total),ly-1,dashLen,3)}
cx.fillStyle='rgba(0,200,255,0.5)';cx.fillRect(0,roadLaneTop,W,2);cx.fillRect(0,roadLaneTop+laneWidth*LANE_COUNT,W,2);
}else{drawRoadMarkings(off)}
updateFreerunParticles(dt,envIdx);
}

[rk1,rk2,cn,'#886622'],['#a04020','#c06030','#aa6020','#cc5530'],

else if(nitro>=100)cx.fillStyle=`rgba(100,230,80,${.7+.2*Math.sin(t*4)})`;
else cx.fillStyle='rgba(230,180,80,0.6)';
cx.fillRect(nbX,nbY,nbW*nitroFill,nbH);
cx.font=`bold ${Math.max(8,fs*.4)}px sans-serif`;
cx.textAlign='center';cx.fillStyle='rgba(255,240,200,0.35)';
cx.fillText('氮气',W/2,nbY+nbH+Math.max(8,fs*.4));

if(speedPenalty>0){
cx.font=`bold ${Math.max(14,fs*1.2)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle=`rgba(255,80,30,${.5+.3*Math.sin(t*8)})`;
cx.fillText('减速中...',W/2,nbY+nbH+Math.max(22,fs*1.5));
}

if(mode==='tournament'){
const target=TRACKS[curTrack].target;
const prog=Math.min(1,distance/target);
const pbW=Math.min(160,W*.35),pbH=5;
const pbX=W/2-pbW/2,pbY=nbY+nbH+Math.max(16,fs*.75);
drawGlassPanel(pbX-2,pbY-2,pbW+4,pbH+4,4,'rgba(230,180,80,0.08)');
cx.fillStyle='rgba(255,200,80,0.6)';cx.fillRect(pbX,pbY,pbW*prog,pbH);
cx.font=`${Math.max(8,fs*.38)}px sans-serif`;
cx.fillStyle='rgba(255,240,200,0.35)';
cx.fillText(`${Math.floor(distance)}m / ${target}m`,W/2,pbY+pbH+Math.max(8,fs*.38));
}
if(mode==='freerun'){
cx.textAlign='center';
cx.font=`bold ${Math.max(12,fs*.95)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,240,200,0.75)';
cx.fillText(`${Math.floor(distance)} m`,W/2,nbY+nbH+Math.max(22,fs*1.2));
cx.font=`${Math.max(8,fs*.45)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,240,200,0.35)';
cx.fillText(ENVS[curEnvIdx].name,W/2,nbY+nbH+Math.max(36,fs*1.8));
}
cx.restore();
}

cx.save();cx.textAlign='center';cx.textBaseline='middle';

cx.fillStyle='#ffc850';cx.shadowColor='rgba(255,180,50,0.5)';cx.shadowBlur=25;
cx.fillText('落 日 狂 飙',W/2,H*.18);cx.shadowBlur=0;

cx.font=`bold ${tf*.4}px 'Segoe UI',sans-serif`;

cx.fillText('SUNSET RUSH',W/2,H*.18+tf*.75);

const sf=Math.max(10,W*.013);
cx.font=`${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,240,200,0.3)';
cx.fillText(`最高分: ${saveData.bestFreeRun}`,W/2,H*.30);

const items=['自由竞速','锦 标 赛','设    置'];
const btnW=Math.min(240,W*.55),btnH=Math.max(40,H*.06);
for(let i=0;i<3;i++){
const by=H*(.42+i*.12);const sel=i===menuSel;
drawGlassPanel(W/2-btnW/2,by-btnH/2,btnW,btnH,12,sel?'rgba(255,200,80,0.45)':'rgba(255,255,255,0.06)');
if(sel){cx.fillStyle='rgba(255,200,80,0.04)';roundRect(W/2-btnW/2,by-btnH/2,btnW,btnH,12);cx.fill()}

}

const pulse=.3+.5*Math.sin(t*2.5);

cx.fillStyle=`rgba(255,240,200,${pulse*.3})`;

cx.fillText('上下切换车道 · N/Shift氮气加速',W/2,H*.89);
cx.restore();
}

function drawTrackSelect(){
cx.fillStyle='rgba(10,8,4,0.5)';cx.fillRect(0,0,W,H);
cx.save();cx.textAlign='center';cx.textBaseline='middle';

const tf=Math.max(18,Math.min(W*.04,H*.04));
cx.font=`bold ${tf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ffc850';cx.shadowColor='rgba(255,180,50,0.4)';cx.shadowBlur=15;
cx.fillText('选择赛道',W/2,H*.08);cx.shadowBlur=0;

const cardW=Math.min(240,W*.6),cardH=Math.min(200,H*.3);
const gap=Math.max(15,W*.03);

for(let i=0;i<TRACKS.length;i++){
const offsetX=W/2+(i-curTrack)*(cardW+gap);
const isCur=i===curTrack;
const td=saveData.tracks[i],tk=TRACKS[i];
if(offsetX<-cardW*1.5||offsetX>W+cardW*1.5)continue;
const scale=isCur?1:.75,alpha=isCur?1:.4;

cx.save();cx.globalAlpha=alpha;cx.translate(offsetX,H*.42);cx.scale(scale,scale);

drawGlassPanel(-cardW/2,-cardH/2,cardW,cardH,14,isCur?'rgba(255,200,80,0.4)':'rgba(255,255,255,0.06)');

const skyG=cx.createLinearGradient(0,-cardH/2,0,-cardH/2+cardH*.35);
skyG.addColorStop(0,'#311845');skyG.addColorStop(0.5,'rgba(200,100,40,0.3)');skyG.addColorStop(1,'rgba(0,0,0,0)');
cx.fillStyle=skyG;cx.fillRect(-cardW/2+2,-cardH/2+2,cardW-4,cardH*.35);

cx.font=`bold ${Math.max(13,cardW*.065)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ffc850';cx.fillText(tk.name,0,-cardH*.05);

cx.font=`${Math.max(10,cardW*.05)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,240,200,0.4)';cx.fillText(tk.sub,0,cardH*.1);

if(!td.unlocked){
cx.font=`${Math.max(20,cardW*.1)}px sans-serif`;
cx.fillStyle='rgba(255,255,255,0.25)';cx.fillText('🔒',0,cardH*.27);
}else{
for(let s=0;s<3;s++){
cx.font=`${Math.max(16,cardW*.08)}px sans-serif`;
cx.fillStyle=s<td.stars?'#ffd060':'rgba(255,255,255,0.12)';
cx.fillText('★',(s-1)*Math.max(18,cardW*.1),cardH*.25);
}
if(td.best>0){
cx.font=`${Math.max(9,cardW*.045)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,200,100,0.5)';cx.fillText(`最高分: ${td.best}`,0,cardH*.38);
}}
cx.restore();
}

cx.font=`${Math.max(10,W*.012)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,240,200,0.3)';
cx.fillText('← → 浏览 · 回车/点击确认 · ESC返回',W/2,H*.88);
cx.font=`${Math.max(9,W*.01)}px sans-serif`;cx.fillStyle='rgba(255,240,200,0.2)';
cx.fillText(`${curTrack+1} / ${TRACKS.length}`,W/2,H*.92);
cx.restore();
}

function drawSettings(){
cx.fillStyle='rgba(10,8,4,0.5)';cx.fillRect(0,0,W,H);
cx.save();cx.textAlign='center';cx.textBaseline='middle';
const tf=Math.max(18,Math.min(W*.04,H*.04));
cx.font=`bold ${tf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ffc850';cx.shadowColor='rgba(255,180,50,0.4)';cx.shadowBlur=15;
cx.fillText('设置',W/2,H*.25);cx.shadowBlur=0;

const sf=Math.max(13,W*.016);
const labelMap={auto:'自动',on:'开启',off:'关闭'};
cx.font=`${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;

cx.fillText(`触控按钮: ${labelMap[saveData.showTouch]}`,W/2,H*.45);
cx.font=`${sf*.7}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,240,220,0.3)';
cx.fillText('按 ↑↓ 或点击切换: 自动 / 开启 / 关闭',W/2,H*.52);

cx.font=`${sf*.75}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,200,100,0.3)';

const modeHint=mode==='freerun'?'自由竞速: 撞障碍物立即结束':'锦标赛: 撞障碍物只减速';
cx.fillText(modeHint,W/2,H*.62);

cx.fillStyle='rgba(255,150,80,0.35)';
cx.fillText('ESC 或点击返回',W/2,H*.72);
cx.restore();
}

function drawGameOver(){
cx.fillStyle='rgba(10,8,4,0.55)';cx.fillRect(0,0,W,H);
cx.save();cx.textAlign='center';cx.textBaseline='middle';

const tf=Math.max(20,Math.min(W*.05,H*.045));
cx.font=`bold ${tf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ff5040';cx.shadowColor='rgba(255,40,20,0.5)';cx.shadowBlur=18;
cx.fillText('比赛结束',W/2,H*.12);cx.shadowBlur=0;

const sf=Math.max(12,W*.016);const lh=sf*1.8;
let y0=H*.22;

cx.font=`bold ${sf*1.4}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ffc850';cx.shadowColor='rgba(255,180,50,0.4)';cx.shadowBlur=12;
cx.fillText(`${Math.floor(score)}`,W/2,y0);cx.shadowBlur=0;
y0+=lh*1.3;

cx.font=`bold ${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
const posColor=racePosition<=1?'#ffd060':racePosition<=3?'#80d060':'#e0a040';
cx.fillStyle=posColor;cx.fillText(`最终排名: 第${racePosition}名`,W/2,y0);
y0+=lh*1.2;

const stats=[
['距离',`${Math.floor(distance)}m`],
['金币',`${coinsCollected}`],
['超车',`${overtakeCount}`],
['粉碎',`${smashCount}`],
['最高时速',`${Math.floor(maxSpd)} km/h`],
['时间',`${Math.floor(surviveTime)}s`]
];

cx.font=`${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
for(const[label,val]of stats){
cx.fillStyle='rgba(255,240,220,0.4)';cx.textAlign='right';cx.fillText(label,W/2-12,y0);
cx.fillStyle='rgba(255,220,100,0.8)';cx.textAlign='left';cx.fillText(val,W/2+12,y0);
y0+=lh;
}

if(mode==='freerun'&&Math.floor(score)>=saveData.bestFreeRun&&score>0){
cx.textAlign='center';cx.font=`${sf*.9}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ffa040';cx.fillText('★ 新纪录 ★',W/2,y0+lh*.3);
}

const pulse=.3+.65*Math.sin(t*2.5);
cx.textAlign='center';cx.fillStyle=`rgba(255,240,200,${pulse*.35})`;
cx.font=`${Math.max(11,W*.013)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillText(mode==='tournament'?'点击或回车返回赛道选择':'点击或回车返回主菜单',W/2,H*.92);
cx.restore();
}

function drawLevelComplete(){
cx.fillStyle='rgba(10,8,4,0.5)';cx.fillRect(0,0,W,H);
cx.save();cx.textAlign='center';cx.textBaseline='middle';

const tf=Math.max(20,Math.min(W*.05,H*.045));
cx.font=`bold ${tf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ffc850';cx.shadowColor='rgba(255,180,50,0.6)';cx.shadowBlur=22;
cx.fillText('赛道通过！',W/2,H*.10);cx.shadowBlur=0;

const sf=Math.max(11,W*.014);
cx.font=`${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='rgba(255,240,200,0.5)';cx.fillText(TRACKS[curTrack].name,W/2,H*.17);

const td=saveData.tracks[curTrack];
const starFs=Math.max(24,Math.min(W,H)*.04);
cx.font=`${starFs}px sans-serif`;
for(let s=0;s<3;s++){
cx.fillStyle=s<td.stars?'#ffd060':'rgba(255,255,255,0.12)';
cx.fillText('★',W/2+(s-1)*starFs*1.3,H*.24);
}

const scf=Math.max(18,W*.03);
cx.font=`bold ${scf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillStyle='#ffc850';cx.shadowColor='rgba(255,180,50,0.4)';cx.shadowBlur=10;
cx.fillText(`${Math.floor(score)}`,W/2,H*.33);cx.shadowBlur=0;

cx.font=`bold ${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
const posColor=racePosition<=1?'#ffd060':racePosition<=3?'#80d060':'#e0a040';
cx.fillStyle=posColor;cx.fillText(`最终排名: 第${racePosition}名`,W/2,H*.39);

const lh=sf*1.7;let y0=H*.46;
const stats=[
['距离',`${Math.floor(distance)}m`],
['金币',`${coinsCollected}`],
['超车',`${overtakeCount}`],
['粉碎',`${smashCount}`],
['最高时速',`${Math.floor(maxSpd)} km/h`],
['时间',`${Math.floor(surviveTime)}s`]
];
cx.font=`${sf}px 'Microsoft YaHei','PingFang SC',sans-serif`;
for(const[label,val]of stats){
cx.fillStyle='rgba(255,240,220,0.4)';cx.textAlign='right';cx.fillText(label,W/2-12,y0);
cx.fillStyle='rgba(255,220,100,0.8)';cx.textAlign='left';cx.fillText(val,W/2+12,y0);
y0+=lh;
}

cx.textAlign='center';
const hasNext=curTrack+1<TRACKS.length&&saveData.tracks[curTrack+1].unlocked;
const pulse=.3+.65*Math.sin(t*2.5);
cx.fillStyle=`rgba(255,240,200,${pulse*.35})`;
cx.font=`${Math.max(11,W*.013)}px 'Microsoft YaHei','PingFang SC',sans-serif`;
cx.fillText(hasNext?'点击或回车进入下一赛道':'点击或回车返回',W/2,H*.92);
cx.restore();
}

// ====== MAIN LOOP ======

let last=0;

function frame(ts){
const dt=Math.min((ts-last)/1000,.04);
last=ts;t+=dt;

let spd;
if(state==='play')spd=baseSpd*speedMul;
else if(state==='gameover'||state==='levelcomplete'){speedMul*=Math.pow(.08,dt);if(speedMul<.015)speedMul=.015;spd=baseSpd*speedMul}
else spd=200*(1+Math.sin(t*.25)*.04);

let effSpd=spd;
if(state==='play'){
if(speedPenalty>0)effSpd*=0.45;
if(nitroActive)effSpd*=2.5;
}

scroll+=effSpd*dt;
wheelAng-=effSpd*dt*.065;

if(state==='play')updateGame(dt,spd);

for(let i=cFx.length-1;i>=0;i--){cFx[i].x+=cFx[i].vx*dt;cFx[i].y+=cFx[i].vy*dt;cFx[i].life-=dt*2.5;if(cFx[i].life<=0)cFx.splice(i,1)}
if(shakeAmt>0){shakeAmt-=dt*1.8;if(shakeAmt<0)shakeAmt=0}
if(flashA>0){flashA-=dt*1.5;if(flashA<0)flashA=0}

cx.save();
if(shakeAmt>0||(state==='play'&&nitroActive)){
const shake=shakeAmt+(nitroActive?.06:0);
cx.translate((Math.random()-.5)*shake*22,(Math.random()-.5)*shake*16);
}
cx.clearRect(-30,-30,W+60,H+60);

if(mode==='freerun'&&(state==='play'||state==='gameover')){
drawFreerunScenery(dt);
}else{
drawSky();drawStars();drawSun();drawClouds();drawBirds();
drawMountainLayer(scroll*0.06,7.3,'#4a3868',H*0.14,roadY-H*0.18);
drawMountainLayer(scroll*0.12,3.1,'#5a4870',H*0.11,roadY-H*0.10);
drawHaze(roadY-H*0.25,roadY,0.04);
drawHillLayer(scroll*0.22,11.7,'#3a5830',H*0.08,roadY-H*0.05);
drawHillLayer(scroll*0.32,19.3,'#2a4820',H*0.06,roadY-H*0.01);
drawFarTreeLine(scroll*0.38);drawRoadPalms(scroll*0.5);drawPowerPoles(scroll*0.7);
drawRoad();drawRoadMarkings(scroll*1.0);drawGrass(scroll*0.8);drawBushes(scroll*0.85);
}

drawFinishLine();
drawObstacles();drawCoins();drawNitroPickups();
drawAiCars();

const carPx=W*.3;
const carPy=state==='menu'||state==='select'||state==='settings'?(lanes[1]||pYMin):pY;
const carSc=Math.min(W,H)/850;
updateDust(dt,carPx,carPy,carSc);
drawDust();drawFireTrail(dt);
drawCar(carPx,carPy);
drawCFx();drawSmashFx(dt);drawSpeedLines(dt);drawOvertakeFx(dt);
drawVignette();drawNitroScreenFx();
if(mode==='freerun'&&(state==='play'||state==='gameover'))drawFreerunParticles(curEnvIdx);

if(flashA>0){cx.fillStyle=`rgba(${flashC},${flashA})`;cx.fillRect(-30,-30,W+60,H+60)}
cx.restore();

drawObstacleWarnings();
drawHUD();
if(mode==='freerun'&&(state==='play'||state==='gameover'))drawEnvWelcome();
if(state==='menu')drawMenu();
else if(state==='select')drawTrackSelect();
else if(state==='settings')drawSettings();
else if(state==='gameover')drawGameOver();
else if(state==='levelcomplete')drawLevelComplete();

requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
